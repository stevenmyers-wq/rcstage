<div class="card space-y-6">
    <h2 class="text-2xl font-bold text-gray-800 border-b pb-2">Admin Analytics Dashboard</h2>
    <p class="text-gray-600 text-sm">Real-time usage metrics and API health monitoring.</p>
    
    <div id="analytics-loading" class="text-center py-8">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
        <p class="mt-4 text-gray-500">Loading analytics data...</p>
    </div>

    <div id="analytics-content" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Tool Popularity (Bar Chart) -->
        <div class="bg-white p-4 rounded-lg border shadow-sm">
            <h3 class="text-lg font-semibold mb-4 text-gray-700">Tool Usage Popularity</h3>
            <canvas id="toolPopularityChart"></canvas>
        </div>

        <!-- API Success vs Error (Doughnut) -->
        <div class="bg-white p-4 rounded-lg border shadow-sm">
            <h3 class="text-lg font-semibold mb-4 text-gray-700">API Actions Health</h3>
            <canvas id="statusRatioChart"></canvas>
        </div>

        <!-- Activity Over Time (Line Chart) -->
        <div class="bg-white p-4 rounded-lg border shadow-sm lg:col-span-2">
            <h3 class="text-lg font-semibold mb-4 text-gray-700">Activity Over Time (Last 1000 Actions)</h3>
            <canvas id="activityChart"></canvas>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/admin/analytics')
        .then(res => res.json())
        .then(data => {
            document.getElementById('analytics-loading').classList.add('hidden');
            if (data.error) {
                alert('Error loading analytics: ' + data.error);
                return;
            }
            document.getElementById('analytics-content').classList.remove('hidden');
            
            // 1. Tool Popularity Bar Chart
            const tools = Object.keys(data.tool_popularity);
            const toolCounts = Object.values(data.tool_popularity);
            new Chart(document.getElementById('toolPopularityChart'), {
                type: 'bar',
                data: {
                    labels: tools,
                    datasets: [{ label: 'Times Used', data: toolCounts, backgroundColor: 'rgba(59, 130, 246, 0.6)', borderColor: 'rgb(59, 130, 246)', borderWidth: 1 }]
                },
                options: { indexAxis: 'y', responsive: true }
            });

            // 2. Status Ratio Doughnut Chart
            new Chart(document.getElementById('statusRatioChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Error'],
                    datasets: [{ data: [data.status_ratio.success || 0, data.status_ratio.error || 0], backgroundColor: ['#10B981', '#EF4444'] }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 3. Activity Line Chart
            const dates = Object.keys(data.activity_over_time);
            const dateCounts = Object.values(data.activity_over_time);
            new Chart(document.getElementById('activityChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{ label: 'Daily Actions', data: dateCounts, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.2)', borderColor: 'rgb(99, 102, 241)', tension: 0.1 }]
                },
                options: { responsive: true }
            });
        }).catch(err => { document.getElementById('analytics-loading').innerHTML = '<p class="text-red-500">Failed to load data.</p>'; });
});
</script>
