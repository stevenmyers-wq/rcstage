<div class="tab-pane fade" id="device-swap" role="tabpanel" aria-labelledby="device-swap-tab">
    <div class="container mt-4">
        <h3>Bulk Device Swap</h3>
        <p class="text-muted">Upload the completed <strong>device-upload.xlsx</strong> template to swap devices in bulk. The system will look up the Target MAC Address in your inventory and swap it with the extension's currently assigned HardPhone.</p>
        
        <div class="card mb-4">
            <div class="card-body">
                <form id="deviceSwapForm">
                    <div class="mb-3">
                        <label for="deviceSwapFile" class="form-label">Upload Device Swap Template (Excel)</label>
                        <input class="form-control" type="file" id="deviceSwapFile" accept=".xlsx, .xls" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="deviceSwapBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="deviceSwapSpinner" role="status" aria-hidden="true"></span>
                        Process Bulk Swap
                    </button>
                </form>
            </div>
        </div>

        <div id="deviceSwapResultsContainer" class="d-none">
            <h4>Execution Results</h4>
            <div class="table-responsive">
                <table class="table table-striped table-bordered" id="deviceSwapResultsTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Extension</th>
                            <th>Target MAC</th>
                            <th>Status</th>
                            <th>Reason / Error</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const swapForm = document.getElementById('deviceSwapForm');
    
    if (swapForm) {
        swapForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('deviceSwapFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select an Excel file to upload.');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            const btn = document.getElementById('deviceSwapBtn');
            const spinner = document.getElementById('deviceSwapSpinner');
            const resultsContainer = document.getElementById('deviceSwapResultsContainer');
            const resultsTableBody = document.querySelector('#deviceSwapResultsTable tbody');
            
            // Lock UI while processing
            btn.disabled = true;
            spinner.classList.remove('d-none');
            resultsContainer.classList.add('d-none');
            resultsTableBody.innerHTML = '';
            
            fetch('/api/device_swap/bulk', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                spinner.classList.add('d-none');
                
                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }
                
                if (data.results && data.results.length > 0) {
                    data.results.forEach(result => {
                        const tr = document.createElement('tr');
                        
                        if (result.status === 'Success') {
                            tr.classList.add('table-success');
                        } else {
                            tr.classList.add('table-danger');
                        }
                        
                        tr.innerHTML = `
                            <td>${result.extension}</td>
                            <td>${result.mac}</td>
                            <td>${result.status}</td>
                            <td>${result.reason}</td>
                        `;
                        resultsTableBody.appendChild(tr);
                    });
                    resultsContainer.classList.remove('d-none');
                } else {
                    alert('No valid records were found to process.');
                }
            })
            .catch(error => {
                btn.disabled = false;
                spinner.classList.add('d-none');
                console.error('Error:', error);
                alert('An unexpected error occurred while processing the file.');
            });
        });
    }
});
</script>
