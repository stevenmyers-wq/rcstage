<div class="tab-pane fade" id="device-swap" role="tabpanel" aria-labelledby="device-swap-tab">
    <div class="container mt-4">
        <h3>Bulk Device Swap</h3>
        <p class="text-muted">Upload the completed <strong>device-upload.xlsx</strong> template to swap devices in bulk. The system will look up the Target MAC Address in your inventory and swap it with the extension's currently assigned HardPhone.</p>
        
        <div class="card mb-4">
            <div class="card-body">
                <form id="deviceSwapForm">
                    <div class="mb-3">
                        <label for="deviceSwapFile" class="form-label">Upload Device Swap Template (Excel)</label>
                        <input class="form-control" type="file" id="deviceSwapFile" accept=".xlsx, .xls" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="deviceSwapBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="deviceSwapSpinner" role="status" aria-hidden="true"></span>
                        Process Bulk Swap
                    </button>
                </form>
            </div>
        </div>

        <div id="deviceSwapResultsContainer" class="d-none">
            <h4>Execution Results</h4>
            <div class="table-responsive">
                <table class="table table-striped table-bordered" id="deviceSwapResultsTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Extension</th>
                            <th>Target MAC</th>
                            <th>Status</th>
                            <th>Reason / Error</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
