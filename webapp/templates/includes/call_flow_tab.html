<!-- Add the required JS libraries for this module -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    // Initialize Mermaid.js
    mermaid.initialize({ startOnLoad: false });
</script>

<div class="space-y-6">
    <h3 class="text-xl font-bold text-blue-700">Call Flow Visualiser</h3>

    <!-- Control Panel -->
    <div class="card space-y-4">
        <h4 class="text-lg font-semibold text-gray-800">1. Search for a Starting Point</h4>
        <div class="flex gap-4">
            <div class="relative w-full">
                <input type="text" id="visualiser-search-input"
                       class="w-full p-3 border border-gray-300 rounded-lg focus:ring-purple-500 focus:border-purple-500"
                       placeholder="Search by Site Name, Phone Number, or Extension..." autocomplete="off">
                <div id="search-results-container"
                     class="absolute z-10 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-lg hidden max-h-60 overflow-y-auto">
                    <!-- Search results will be populated here by JavaScript -->
                </div>
            </div>
            <button type="button" id="visualize-button"
                    class="bg-purple-600 text-white py-3 px-6 rounded-lg hover:bg-purple-700 transition whitespace-nowrap"
                    disabled>
                Visualize
            </button>
        </div>
    </div>

    <!-- FIX: Diagram and Export section is now OUTSIDE the constraining 'card' div -->
    <div class="w-full bg-white rounded-xl shadow-lg border border-gray-200 p-6 space-y-3">
        <div class="flex justify-between items-center">
            <h4 class="text-lg font-semibold text-gray-800">2. Call Flow Diagram</h4>
            <div id="export-controls" class="flex gap-2" style="display:none;">
                <button id="save-pdf-btn" class="bg-gray-600 text-white text-sm py-2 px-4 rounded-lg hover:bg-gray-700 transition">
                    Save as PDF
                </button>
            </div>
        </div>
        <!-- This container will now use the full width and expand vertically -->
        <div id="call-flow-diagram"
             class="mt-4 w-full bg-white rounded-lg flex items-center justify-center text-gray-400 overflow-x-auto p-4 min-h-[500px]">
            Search for an item and click 'Visualize' to generate the flow.
        </div>
    </div>

    <!-- API Log -->
    <div class="card space-y-3">
        <h4 class="text-lg font-semibold text-gray-800">3. Live API Debug Log</h4>
        <div id="api-log-container"
             class="mt-4 p-4 border border-gray-200 bg-gray-900 text-white rounded-lg max-h-96 overflow-y-auto font-mono text-xs">
            API calls will appear here after visualization.
        </div>
    </div>
</div>

<!-- Load the dedicated JavaScript for this module -->
<script src="{{ url_for('static', filename='js/visualiser.js') }}"></script>
