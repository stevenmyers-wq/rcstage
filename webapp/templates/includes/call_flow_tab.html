<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>
    #call-flow-diagram { 
        min-height: 700px; 
        height: 80vh; 
        border: 2px solid #e2e8f0; 
        position: relative; 
        background: #fafafa; 
        overflow: hidden; /* Important for SVG pan zoom */
    }
    
    /* Select2 Customization */
    .select2-container .select2-selection--single { height: 50px !important; border: 1px solid #d1d5db !important; border-radius: 0.5rem !important; display: flex !important; align-items: center !important; }
    .select2-selection__arrow { height: 48px !important; }
    .select2-container--default .select2-selection--single .select2-selection__rendered { color: #374151 !important; font-size: 16px; padding-left: 12px; }
    
    /* Overlay Controls */
    .controls-overlay {
        position: absolute;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        background: rgba(255,255,255,0.9);
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        border: 1px solid #ddd;
        display: flex;
        gap: 5px;
    }
    .ctrl-btn {
        background: #fff; border: 1px solid #ccc; width: 36px; height: 36px;
        border-radius: 4px; font-weight: bold; cursor: pointer; color: #555;
        display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .ctrl-btn:hover { background: #f0f0f0; color: #000; }
</style>

<div class="space-y-6">
    <h3 class="text-xl font-bold text-blue-700">Call Flow Visualiser</h3>
    
    <div class="card space-y-4">
        <h4 class="text-lg font-semibold text-gray-800">1. Select Entry Point</h4>
        <div class="flex gap-4 items-center">
            <div class="w-full">
                <select id="visualiser-target-select" class="w-full" style="width: 100%;">
                    <option></option>
                </select>
                <p id="loading-indicator" class="text-xs text-gray-500 mt-1">
                    Loading account data...
                </p>
            </div>
            <button type="button" id="visualize-button" class="bg-purple-600 text-white py-3 px-6 rounded-lg hover:bg-purple-700 transition whitespace-nowrap h-[50px]">
                Visualize
            </button>
        </div>
    </div>

    <div class="w-full bg-white rounded-xl shadow-lg border border-gray-200 p-6 space-y-3">
        <div class="flex justify-between items-center">
            <h4 class="text-lg font-semibold text-gray-800">2. Call Flow Diagram</h4>
            <div id="export-controls" style="display:none;">
                <button id="save-pdf-btn" class="bg-gray-600 text-white text-sm py-2 px-4 rounded-lg hover:bg-gray-700 transition">Save Image</button>
            </div>
        </div>
        
        <div style="position: relative;">
            <div id="call-flow-diagram" class="mt-4 w-full bg-white rounded-lg flex items-center justify-center text-gray-400">
                Select an extension above and click 'Visualize'.
            </div>
            
            <div id="zoom-controls" class="controls-overlay" style="display:none;">
                <button class="ctrl-btn" id="btn-zoom-in" title="Zoom In">+</button>
                <button class="ctrl-btn" id="btn-zoom-out" title="Zoom Out">−</button>
                <button class="ctrl-btn" id="btn-reset" title="Reset View">⟲</button>
            </div>
        </div>
        
        <div class="text-sm text-gray-600 bg-blue-50 p-3 rounded-lg">
            💡 <strong>Tip:</strong> Mouse Wheel to Zoom • Click & Drag to Pan
        </div>
    </div>
    
    <div class="card space-y-3">
        <h4 class="text-lg font-semibold text-gray-800">3. Live API Debug Log</h4>
        <div id="api-log-container" class="mt-4 p-4 border border-gray-200 bg-gray-900 text-white rounded-lg max-h-96 overflow-y-auto font-mono text-xs"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'base', flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' } });

    let panZoomInstance = null;

    $(document).ready(function() {
        // Init Select2
        $('#visualiser-target-select').select2({ placeholder: "Wait, loading data...", width: '100%' });
        const $loadingIndicator = $('#loading-indicator');

        // Fetch Extensions
        $.ajax({
            url: '/api/rc/visualiser/search',
            method: 'GET',
            success: function(response) {
                if(response.status === 'success') {
                    $loadingIndicator.hide();
                    if ($('#visualiser-target-select').data('select2')) $('#visualiser-target-select').select2('destroy');
                    
                    $('#visualiser-target-select').empty().select2({
                        placeholder: "Select a Call Flow Start Point",
                        data: response.results,
                        width: '100%',
                        allowClear: true
                    });
                } else {
                    $loadingIndicator.text("Error: " + response.message).addClass('text-red-500');
                }
            },
            error: function(err) {
                $loadingIndicator.text("Failed to connect to server.").addClass('text-red-500');
            }
        });

        // Visualize Click
        $('#visualize-button').on('click', function() {
            const selectedId = $('#visualiser-target-select').val();
            if (!selectedId || selectedId === 'error') { alert("Please select a valid extension."); return; }

            const btn = $(this);
            const originalText = btn.text();
            btn.prop('disabled', true).text('Generating...');
            
            // Show Spinner
            $('#call-flow-diagram').html('<div class="flex flex-col items-center"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-700 mb-4"></div><p>Tracing call flow (This may take 10-20s)...</p></div>');
            
            // Hide controls during load
            $('#zoom-controls, #export-controls').hide();

            fetch(`/api/rc/trace-flow/${selectedId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') { renderMermaid(data.mermaid_graph); updateApiLog(data.api_log); }
                    else { $('#call-flow-diagram').html(`<div class="text-red-500 p-4 font-bold">Error: ${data.message}</div>`); }
                })
                .catch(err => $('#call-flow-diagram').html(`<div class="text-red-500 p-4">System Error: ${err}</div>`))
                .finally(() => btn.prop('disabled', false).text(originalText));
        });

        async function renderMermaid(graph) {
            const el = document.querySelector('#call-flow-diagram');
            
            // Clean up old instance
            if(panZoomInstance) { panZoomInstance.destroy(); panZoomInstance = null; }
            
            try {
                const { svg } = await mermaid.render('mermaid-svg-' + Date.now(), graph);
                el.innerHTML = svg;
                
                const svgEl = el.querySelector('svg');
                
                // Set SVG to fill container for proper zooming
                svgEl.style.width = '100%';
                svgEl.style.height = '100%';
                
                // Initialize SVG-Pan-Zoom
                panZoomInstance = svgPanZoom(svgEl, {
                    zoomEnabled: true,
                    controlIconsEnabled: false, // We use custom buttons
                    fit: true,
                    center: true,
                    minZoom: 0.1,
                    maxZoom: 10
                });
                
                // Show Controls
                $('#zoom-controls, #export-controls').show();
                
                // Bind Custom Buttons
                $('#btn-zoom-in').off().on('click', function(){ panZoomInstance.zoomIn(); });
                $('#btn-zoom-out').off().on('click', function(){ panZoomInstance.zoomOut(); });
                $('#btn-reset').off().on('click', function(){ panZoomInstance.resetZoom(); panZoomInstance.center(); });
                
            } catch (e) { 
                el.innerHTML = `<div class="text-red-500 p-4">Mermaid Render Error: ${e.message}</div>`; 
            }
        }

        $('#save-pdf-btn').on('click', function() {
            const el = document.querySelector('#call-flow-diagram');
            if(!el.querySelector('svg')) return;
            
            // Reset zoom to fetch full image
            if(panZoomInstance) { panZoomInstance.resetZoom(); panZoomInstance.center(); }
            
            html2canvas(el).then(canvas => {
                const link = document.createElement('a');
                link.download = 'call-flow.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        });

        function updateApiLog(logs) {
            if (!logs || !logs.length) return;
            $('#api-log-container').html(logs.map(l => `<div class="mb-2 pb-2 border-b border-gray-700"><span class="text-green-400">[${l.method}]</span> <span class="text-blue-300">${l.url}</span><div class="text-gray-400 pl-4">Status: ${l.status}</div></div>`).join(''));
        }
    });
</script>
