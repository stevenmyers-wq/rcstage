<div class="space-y-6">
    <h3 class="text-xl font-bold text-blue-700">Call Flow Visualiser</h3>

    <div class="card space-y-4">
        <h4 class="text-lg font-semibold text-gray-800">1. Select Phone Number</h4>
        
        <input type="text" id="phone-search" placeholder="Search by number, usage type, or name" 
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-purple-500 focus:border-purple-500">
        
        <div class="relative">
            <select id="phone-number-select" 
                    class="w-full p-3 border border-gray-300 rounded-lg bg-white appearance-none pr-10">
                <option value="">-- Select a number from the list --</option>
                </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
            </div>
        </div>

        <button type="button" id="visualize-button" 
                class="w-full bg-purple-600 text-white py-3 px-4 rounded-lg hover:bg-purple-700 transition"
                disabled>
            Visualise Call Flow
        </button>
    </div>

    <div class="card space-y-3">
        <h4 class="text-lg font-semibold text-gray-800">2. Call Flow Diagram</h4>
        <div id="call-flow-diagram" 
            class="mt-4 p-4 border border-gray-200 min-h-[500px] bg-white rounded-lg flex items-center justify-center text-gray-400">
            Select a number and click 'Visualise' to generate the flow.
        </div>
    </div>
    
    <div class="card space-y-3">
        <h4 class="text-lg font-semibold text-gray-800">3. Live API Debug Log</h4>
        <div id="api-log-container" 
            class="mt-4 p-4 border border-gray-200 bg-gray-900 text-white rounded-lg max-h-96 overflow-y-auto font-mono text-xs">
            API calls will appear here after visualization.
        </div>
    </div>
</div>
