<div class="space-y-6 animate-fade-in p-4">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Port Mapping</h2>
            <p class="text-gray-600 mt-2">Provide the LOA (PDF) and BRD (Excel) via file upload or public Google Drive link to extract and map phone numbers.</p>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
        <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">Configuration Files</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition relative">
                <div class="text-blue-500 mb-2 text-3xl">📄</div>
                <h4 class="font-bold text-gray-700 mb-3">LOA (PDF)</h4>
                
                <label class="cursor-pointer block mb-3">
                    <span class="text-blue-600 font-bold hover:underline bg-blue-50 px-4 py-2 rounded-full border border-blue-200 inline-block">Upload LOA File</span>
                    <input type="file" id="loa-file" class="hidden" accept="application/pdf">
                </label>
                <p id="loa-filename" class="text-xs text-gray-500 font-mono mb-4">No file selected</p>
                
                <div class="flex items-center justify-center gap-2 mb-4">
                    <hr class="w-1/4 border-gray-300">
                    <span class="text-xs text-gray-400 font-bold uppercase">OR</span>
                    <hr class="w-1/4 border-gray-300">
                </div>

                <label class="block text-left">
                    <span class="text-blue-600 font-bold text-sm">Paste Google Drive Link</span>
                    <input type="url" id="loa-url" class="w-full mt-1 p-2 border border-gray-300 rounded text-sm text-gray-700" placeholder="https://drive.google.com/file/d/...">
                </label>
            </div>

            <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition relative">
                <div class="text-green-500 mb-2 text-3xl">📊</div>
                <h4 class="font-bold text-gray-700 mb-3">BRD (Excel)</h4>
                
                <label class="cursor-pointer block mb-3">
                    <span class="text-green-600 font-bold hover:underline bg-green-50 px-4 py-2 rounded-full border border-green-200 inline-block">Upload BRD File</span>
                    <input type="file" id="brd-file" class="hidden" accept=".xlsx, .xls">
                </label>
                <p id="brd-filename" class="text-xs text-gray-500 font-mono mb-4">No file selected</p>

                <div class="flex items-center justify-center gap-2 mb-4">
                    <hr class="w-1/4 border-gray-300">
                    <span class="text-xs text-gray-400 font-bold uppercase">OR</span>
                    <hr class="w-1/4 border-gray-300">
                </div>

                <label class="block text-left">
                    <span class="text-green-600 font-bold text-sm">Paste Google Drive Link</span>
                    <input type="url" id="brd-url" class="w-full mt-1 p-2 border border-gray-300 rounded text-sm text-gray-700" placeholder="https://docs.google.com/spreadsheets/d/...">
                </label>
            </div>
            
        </div>
        
        <button id="pm-submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-150 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            Submit & Process Files
        </button>
        
        <div id="pm-status" class="hidden mt-4 p-4 rounded-lg text-sm border shadow-sm text-center"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const loaInput = document.getElementById('loa-file');
    const loaUrl = document.getElementById('loa-url');
    const brdInput = document.getElementById('brd-file');
    const brdUrl = document.getElementById('brd-url');
    const submitBtn = document.getElementById('pm-submit-btn');
    const statusDiv = document.getElementById('pm-status');

    function checkInputs() {
        const hasLoa = loaInput.files.length > 0 || loaUrl.value.trim().length > 0;
        const hasBrd = brdInput.files.length > 0 || brdUrl.value.trim().length > 0;
        submitBtn.disabled = !(hasLoa && hasBrd);
    }

    // Mutually exclusive inputs for LOA
    loaInput.addEventListener('change', (e) => {
        document.getElementById('loa-filename').textContent = e.target.files[0] ? e.target.files[0].name : "No file selected";
        if (e.target.files.length > 0) loaUrl.value = ""; 
        checkInputs();
    });
    loaUrl.addEventListener('input', () => {
        if (loaUrl.value.trim().length > 0) { 
            loaInput.value = ""; 
            document.getElementById('loa-filename').textContent = "No file selected"; 
        }
        checkInputs();
    });

    // Mutually exclusive inputs for BRD
    brdInput.addEventListener('change', (e) => {
        document.getElementById('brd-filename').textContent = e.target.files[0] ? e.target.files[0].name : "No file selected";
        if (e.target.files.length > 0) brdUrl.value = "";
        checkInputs();
    });
    brdUrl.addEventListener('input', () => {
        if (brdUrl.value.trim().length > 0) { 
            brdInput.value = ""; 
            document.getElementById('brd-filename').textContent = "No file selected"; 
        }
        checkInputs();
    });

    submitBtn.addEventListener('click', async () => {
        const formData = new FormData();
        
        if (loaInput.files.length > 0) formData.append('loa_file', loaInput.files[0]);
        if (loaUrl.value.trim()) formData.append('loa_url', loaUrl.value.trim());
        
        if (brdInput.files.length > 0) formData.append('brd_file', brdInput.files[0]);
        if (brdUrl.value.trim()) formData.append('brd_url', brdUrl.value.trim());

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="animate-pulse">Processing AI & Mapping... (This may take 30s+)</span>';
        
        statusDiv.className = "mt-4 p-4 rounded-lg text-sm border shadow-sm text-center bg-blue-50 text-blue-800 border-blue-200 block";
        statusDiv.innerHTML = "Processing files, extracting numbers with Gemini, and querying live RingCentral API...";

        try {
            const response = await fetch('/api/port_mapping/process', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Processed_Port_Mapping_${new Date().getTime()}.xlsx`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                
                statusDiv.className = "mt-4 p-4 rounded-lg text-sm border shadow-sm text-center bg-green-50 text-green-800 border-green-200 block";
                statusDiv.innerHTML = "<strong>✅ Mapping Complete!</strong> File downloaded successfully.";
            } else {
                const data = await response.json();
                throw new Error(data.error || "An unknown error occurred.");
            }
        } catch (err) {
            statusDiv.className = "mt-4 p-4 rounded-lg text-sm border shadow-sm text-center bg-red-50 text-red-800 border-red-200 block";
            statusDiv.innerHTML = `<strong>❌ Error:</strong> ${err.message}`;
        } finally {
            submitBtn.innerHTML = 'Submit & Process Files';
            checkInputs(); 
        }
    });
});
</script>
