<h3 class="text-heading mb-4 border-b border-slate-200 dark:border-slate-700 pb-2 w-full">Configuration Files</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 w-full">
    
    <div class="border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-6 text-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition relative bg-white dark:bg-slate-800 shadow-sm">
        <div class="text-blue-500 mb-3 text-4xl drop-shadow-sm">📄</div>
        <h4 class="font-bold text-slate-700 dark:text-slate-200 mb-4 text-lg">LOA (PDF)</h4>
        
        <label class="cursor-pointer block mb-4">
            <span class="text-blue-600 dark:text-blue-400 font-bold hover:underline bg-blue-50 dark:bg-blue-900/30 px-5 py-2.5 rounded-full border border-blue-200 dark:border-blue-800 inline-block transition-colors">Upload LOA File</span>
            <input type="file" id="loa-file" class="hidden" accept="application/pdf">
        </label>
        <p id="loa-filename" class="text-xs text-slate-500 dark:text-slate-400 font-mono mb-5 truncate px-4">No file selected</p>
        
        <div class="flex items-center justify-center gap-3 mb-5">
            <hr class="w-1/4 border-slate-200 dark:border-slate-700">
            <span class="text-xs text-slate-400 dark:text-slate-500 font-bold uppercase tracking-widest">OR</span>
            <hr class="w-1/4 border-slate-200 dark:border-slate-700">
        </div>

        <label class="block text-left">
            <span class="input-label !text-blue-600 dark:!text-blue-400">Paste Google Drive Link</span>
            <input type="url" id="loa-url" class="input-field mt-1" placeholder="https://drive.google.com/file/d/...">
        </label>
    </div>

    <div class="border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-6 text-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition relative bg-white dark:bg-slate-800 shadow-sm">
        <div class="text-green-500 mb-3 text-4xl drop-shadow-sm">📊</div>
        <h4 class="font-bold text-slate-700 dark:text-slate-200 mb-4 text-lg">BRD (Excel)</h4>
        
        <label class="cursor-pointer block mb-4">
            <span class="text-green-600 dark:text-green-400 font-bold hover:underline bg-green-50 dark:bg-green-900/30 px-5 py-2.5 rounded-full border border-green-200 dark:border-green-800 inline-block transition-colors">Upload BRD File</span>
            <input type="file" id="brd-file" class="hidden" accept=".xlsx, .xls">
        </label>
        <p id="brd-filename" class="text-xs text-slate-500 dark:text-slate-400 font-mono mb-5 truncate px-4">No file selected</p>

        <div class="flex items-center justify-center gap-3 mb-5">
            <hr class="w-1/4 border-slate-200 dark:border-slate-700">
            <span class="text-xs text-slate-400 dark:text-slate-500 font-bold uppercase tracking-widest">OR</span>
            <hr class="w-1/4 border-slate-200 dark:border-slate-700">
        </div>

        <label class="block text-left">
            <span class="input-label !text-green-600 dark:!text-green-400">Paste Google Drive Link</span>
            <input type="url" id="brd-url" class="input-field mt-1" placeholder="https://docs.google.com/spreadsheets/d/...">
        </label>
    </div>
    
</div>

<button id="pm-submit-btn" class="btn-primary w-full !py-4 text-lg disabled:opacity-50 disabled:cursor-not-allowed shadow-md" disabled>
    Submit & Process Files
</button>

<div id="pm-status" class="hidden mt-6 card !py-4 text-center"></div>

<script>
    if (document.getElementById('pm-submit-btn')) {
        const loaInput = document.getElementById('loa-file');
        const loaUrl = document.getElementById('loa-url');
        const brdInput = document.getElementById('brd-file');
        const brdUrl = document.getElementById('brd-url');
        const submitBtn = document.getElementById('pm-submit-btn');
        const statusDiv = document.getElementById('pm-status');

        function checkInputs() {
            const hasLoa = loaInput.files.length > 0 || loaUrl.value.trim().length > 0;
            const hasBrd = brdInput.files.length > 0 || brdUrl.value.trim().length > 0;
            submitBtn.disabled = !(hasLoa && hasBrd);
        }

        loaInput.addEventListener('change', (e) => {
            document.getElementById('loa-filename').textContent = e.target.files[0] ? e.target.files[0].name : "No file selected";
            if (e.target.files.length > 0) loaUrl.value = ""; 
            checkInputs();
        });
        loaUrl.addEventListener('input', () => {
            if (loaUrl.value.trim().length > 0) { 
                loaInput.value = ""; 
                document.getElementById('loa-filename').textContent = "No file selected"; 
            }
            checkInputs();
        });

        brdInput.addEventListener('change', (e) => {
            document.getElementById('brd-filename').textContent = e.target.files[0] ? e.target.files[0].name : "No file selected";
            if (e.target.files.length > 0) brdUrl.value = "";
            checkInputs();
        });
        brdUrl.addEventListener('input', () => {
            if (brdUrl.value.trim().length > 0) { 
                brdInput.value = ""; 
                document.getElementById('brd-filename').textContent = "No file selected"; 
            }
            checkInputs();
        });

        submitBtn.addEventListener('click', async () => {
            const formData = new FormData();
            
            if (loaInput.files.length > 0) formData.append('loa_file', loaInput.files[0]);
            if (loaUrl.value.trim()) formData.append('loa_url', loaUrl.value.trim());
            
            if (brdInput.files.length > 0) formData.append('brd_file', brdInput.files[0]);
            if (brdUrl.value.trim()) formData.append('brd_url', brdUrl.value.trim());

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="animate-pulse">Processing AI & Mapping... (This may take 30s+)</span>';
            
            statusDiv.className = "mt-6 card !py-4 text-center bg-blue-50 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 border-blue-200 dark:border-blue-800 block";
            statusDiv.innerHTML = "Processing files, extracting numbers with Gemini, and querying live RingCentral API...";

            try {
                const response = await fetch('/api/port_mapping/process', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `Processed_Port_Mapping_${new Date().getTime()}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    
                    statusDiv.className = "mt-6 card !py-4 text-center bg-green-50 dark:bg-green-900/30 text-green-800 dark:text-green-400 border-green-200 dark:border-green-800 block";
                    statusDiv.innerHTML = "<strong>✅ Mapping Complete!</strong> File downloaded successfully.";
                } else {
                    const data = await response.json();
                    if(response.status === 401) {
                        alert("Session expired. Please Authorize & Bridge again.");
                        window.location.href = '/api/sm_auth/logout?tab=port_mapping';
                    }
                    throw new Error(data.error || "An unknown error occurred.");
                }
            } catch (err) {
                statusDiv.className = "mt-6 card !py-4 text-center bg-red-50 dark:bg-red-900/30 text-red-800 dark:text-red-400 border-red-200 dark:border-red-800 block";
                statusDiv.innerHTML = `<strong>❌ Error:</strong> ${err.message}`;
            } finally {
                submitBtn.innerHTML = 'Submit & Process Files';
                checkInputs(); 
            }
        });
    }
</script>
