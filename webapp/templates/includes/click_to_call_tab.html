<div class="space-y-8 animate-fade-in w-full max-w-3xl mx-auto">
    <div class="mb-4 border-b border-slate-200 dark:border-slate-800 pb-6">
        <h2 class="text-display mb-2">Click to Call (RingCX Dialer)</h2>
        <p class="text-subheading">Trigger an outbound call using the RingCX dialer API.</p>
    </div>

    <div class="card bg-blue-50/50 dark:bg-blue-900/10 border-blue-100 dark:border-blue-800/50 shadow-sm !p-6 mb-6">
        <p class="text-sm text-blue-800 dark:text-blue-300 font-medium">This tool demonstrates the RingCX Outbound API. Enter a destination number and the agent's station ID to initiate a call.</p>
    </div>
    
    <div class="card w-full">
        <form id="click-to-call-form" class="space-y-6">
            <div class="input-wrapper">
                <label class="input-label" for="c2c-target-number">Destination Phone Number</label>
                <input type="text" id="c2c-target-number" class="input-field font-mono" placeholder="+1234567890" required>
            </div>
            
            <div class="input-wrapper">
                <label class="input-label" for="c2c-station-id">Agent Station ID (RingCX)</label>
                <input type="text" id="c2c-station-id" class="input-field font-mono" placeholder="Enter Station ID" required>
            </div>
            
            <div class="input-wrapper">
                <label class="input-label" for="c2c-caller-id">Caller ID (Optional)</label>
                <input type="text" id="c2c-caller-id" class="input-field font-mono" placeholder="+1987654321">
            </div>
            
            <div class="pt-4 border-t border-slate-100 dark:border-slate-800">
                <button type="submit" class="btn-primary w-full !py-3.5 text-base shadow-md">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    Initiate Call
                </button>
            </div>
        </form>
        
        <div id="c2c-result" class="hidden mt-6 p-4 rounded-xl text-sm font-bold text-center border shadow-sm"></div>
    </div>
</div>

<script>
    document.getElementById('click-to-call-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const resultDiv = document.getElementById('c2c-result');
        const btn = e.target.querySelector('button[type="submit"]');
        
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner border-white w-5 h-5 mr-2"></div> Initiating...';
        resultDiv.classList.add('hidden');
        
        const payload = {
            target_number: document.getElementById('c2c-target-number').value,
            station_id: document.getElementById('c2c-station-id').value,
            caller_id: document.getElementById('c2c-caller-id').value
        };
        
        try {
            const res = await fetch('/api/click_to_call/dial', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            resultDiv.classList.remove('hidden', 'bg-rose-50', 'dark:bg-rose-900/30', 'text-rose-700', 'dark:text-rose-400', 'border-rose-200', 'dark:border-rose-800');
            resultDiv.classList.add('bg-emerald-50', 'dark:bg-emerald-900/30', 'text-emerald-700', 'dark:text-emerald-400', 'border-emerald-200', 'dark:border-emerald-800');
            resultDiv.innerText = data.message || 'Call initiated successfully!';
            
        } catch (err) {
            resultDiv.classList.remove('hidden', 'bg-emerald-50', 'dark:bg-emerald-900/30', 'text-emerald-700', 'dark:text-emerald-400', 'border-emerald-200', 'dark:border-emerald-800');
            resultDiv.classList.add('bg-rose-50', 'dark:bg-rose-900/30', 'text-rose-700', 'dark:text-rose-400', 'border-rose-200', 'dark:border-rose-800');
            resultDiv.innerText = 'Error initiating call. Please check console.';
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg> Initiate Call';
        }
    });
</script>
