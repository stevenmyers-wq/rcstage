<div id="ringex-uat-tab" class="flex flex-col h-full">
    <h2 class="text-2xl font-semibold mb-4 text-gray-700">RingEX UAT Generator</h2>
    <p class="text-gray-600 mb-6">Automatically crawl an extension's routing rules and generate standard User Acceptance Testing scripts.</p>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 flex flex-col gap-4">
            <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-5">
                <h3 class="text-lg font-bold text-gray-800 mb-4">Select Target</h3>
                
                <div class="mb-4">
                    <label for="uatTargetSelect" class="block text-sm font-medium text-gray-700 mb-1">Extension / Call Queue / IVR:</label>
                    <select id="uatTargetSelect" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 bg-gray-50">
                        <option value="">Loading options...</option>
                    </select>
                </div>

                <button id="generateUatBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition shadow-sm disabled:opacity-50">
                    Generate UAT Script
                </button>
                
                <div id="uatStatusMessage" class="mt-3 text-sm font-medium hidden"></div>
            </div>
        </div>

        <div class="lg:col-span-2 flex flex-col h-full">
            <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-0 overflow-hidden flex flex-col h-full min-h-[500px]">
                
                <div class="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-gray-800" id="uatTableName">Test Script: <span class="font-normal text-gray-500">None selected</span></h3>
                    <button id="copyUatBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-semibold py-1.5 px-3 rounded transition shadow-sm hidden">
                        Copy to Clipboard
                    </button>
                </div>

                <div class="overflow-x-auto flex-grow">
                    <table class="w-full text-left border-collapse" id="uatTable">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-sm border-b border-gray-200">
                                <th class="p-3 font-semibold w-12 text-center">#</th>
                                <th class="p-3 font-semibold w-1/4">Step</th>
                                <th class="p-3 font-semibold w-1/4">Action</th>
                                <th class="p-3 font-semibold w-1/2">Expected Result</th>
                                <th class="p-3 font-semibold w-24 text-center border-l border-gray-200">Pass / Fail</th>
                            </tr>
                        </thead>
                        <tbody id="uatTableBody" class="divide-y divide-gray-200 text-sm text-gray-700">
                            <tr>
                                <td colspan="5" class="p-8 text-center text-gray-400 italic">Select an extension and click Generate.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const targetSelect = document.getElementById('uatTargetSelect');
        const generateBtn = document.getElementById('generateUatBtn');
        const statusMsg = document.getElementById('uatStatusMessage');
        const tableBody = document.getElementById('uatTableBody');
        const tableName = document.getElementById('uatTableName');
        const copyBtn = document.getElementById('copyUatBtn');

        // Load dropdown options on load
        async function loadTargets() {
            try {
                const response = await fetch('/api/ringex_uat/entities');
                if (response.status === 401) return; // Handled by global auth
                const data = await response.json();
                
                if (data.success) {
                    targetSelect.innerHTML = '<option value="">-- Select a Target --</option>';
                    data.entities.forEach(ext => {
                        const opt = document.createElement('option');
                        opt.value = ext.id;
                        opt.dataset.name = ext.name;
                        opt.dataset.number = ext.extensionNumber;
                        opt.textContent = `${ext.name} (Ext ${ext.extensionNumber}) - ${ext.type}`;
                        targetSelect.appendChild(opt);
                    });
                } else {
                    targetSelect.innerHTML = `<option value="">Error: ${data.error}</option>`;
                }
            } catch (err) {
                targetSelect.innerHTML = `<option value="">Failed to load data.</option>`;
            }
        }

        // Generate Script
        generateBtn.addEventListener('click', async () => {
            if (!targetSelect.value) {
                showStatus('Please select a target first.', 'text-red-600');
                return;
            }

            const selectedOpt = targetSelect.options[targetSelect.selectedIndex];
            const payload = {
                extension_id: selectedOpt.value,
                extension_name: selectedOpt.dataset.name,
                extension_number: selectedOpt.dataset.number
            };

            generateBtn.disabled = true;
            showStatus('Crawling routing rules...', 'text-blue-600');
            tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-500">Generating script...</td></tr>';

            try {
                const response = await fetch('/api/ringex_uat/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.success) {
                    renderTable(data.cases, payload.extension_name);
                    showStatus('Script generated successfully!', 'text-green-600');
                    setTimeout(() => statusMsg.classList.add('hidden'), 3000);
                } else {
                    showStatus(`Error: ${data.error}`, 'text-red-600');
                    tableBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-500">Failed to generate: ${data.error}</td></tr>`;
                }
            } catch (err) {
                showStatus('Network error occurred.', 'text-red-600');
            } finally {
                generateBtn.disabled = false;
            }
        });

        // Render the UI table
        function renderTable(cases, name) {
            tableName.innerHTML = `Test Script: <span class="font-normal text-blue-600">${name}</span>`;
            tableBody.innerHTML = '';
            copyBtn.classList.remove('hidden');

            cases.forEach((c, index) => {
                const row = document.createElement('tr');
                row.className = "hover:bg-blue-50 transition-colors";
                row.innerHTML = `
                    <td class="p-3 text-center text-gray-500 font-medium">${index + 1}</td>
                    <td class="p-3 font-medium">${c.step}</td>
                    <td class="p-3">${c.action}</td>
                    <td class="p-3 text-blue-800">${c.expected}</td>
                    <td class="p-3 text-center border-l border-gray-200">
                        <div class="w-6 h-6 border-2 border-gray-300 rounded mx-auto bg-white"></div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Copy Table to Clipboard (Formatted for Excel/Sheets)
        copyBtn.addEventListener('click', () => {
            const table = document.getElementById('uatTable');
            const range = document.createRange();
            range.selectNode(table);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            
            try {
                document.execCommand('copy');
                const originalText = copyBtn.innerText;
                copyBtn.innerText = 'Copied!';
                copyBtn.classList.replace('bg-gray-200', 'bg-green-200');
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.classList.replace('bg-green-200', 'bg-gray-200');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy table', err);
            }
            window.getSelection().removeAllRanges();
        });

        function showStatus(msg, colorClass) {
            statusMsg.textContent = msg;
            statusMsg.className = `mt-3 text-sm font-medium ${colorClass} block`;
        }

        loadTargets();
    });
</script>
