<div class="space-y-8">
    <div class="text-center space-y-2">
        <h2 class="text-3xl font-bold text-gray-800">Notifications Manager</h2>
        <p class="text-gray-600 max-w-2xl mx-auto">Audit, Configure, or Bulk Update User Notification Preferences.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="card flex flex-col items-center text-center p-8 hover:shadow-xl transition-shadow duration-300 border border-gray-100">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-6">
                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-3">Audit Settings</h3>
            <p class="text-gray-500 text-sm mb-8 flex-grow leading-relaxed">
                Generate a comprehensive Excel report. Runs in background to handle large accounts.
            </p>
            <button id="btn-audit-start" class="w-full py-3 px-4 border-2 border-blue-600 text-blue-600 font-bold rounded-lg hover:bg-blue-600 hover:text-white transition-all duration-200">
                Start Audit Report
            </button>
        </div>
        
        </div>

    <div class="mt-8 bg-gray-900 rounded-lg shadow-lg overflow-hidden ring-1 ring-gray-800">
        <div class="flex justify-between items-center px-4 py-2 bg-gray-800 border-b border-gray-700">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">System Logs</span>
            <button onclick="document.getElementById('notification-logs').innerHTML = 'Ready...';" class="text-xs text-gray-500 hover:text-white">Clear</button>
        </div>
        <div id="notification-logs" class="p-4 h-64 overflow-y-auto font-mono text-sm text-green-400 whitespace-pre-wrap">Ready...</div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const logBox = document.getElementById('notification-logs');
    function log(msg) {
        if (logBox) {
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `\n[${time}] ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }
    }

    // AUDIT LOGIC (Polling)
    const btnAudit = document.getElementById('btn-audit-start');
    if (btnAudit) {
        btnAudit.addEventListener('click', async () => {
            log('Starting Background Audit...');
            btnAudit.disabled = true;
            btnAudit.innerText = "Starting...";

            try {
                // 1. Start Job
                const startResp = await fetch('/notifications/audit/start', { method: 'POST' });
                const startData = await startResp.json();
                
                if (!startResp.ok) throw new Error(startData.error || "Failed to start");
                
                const jobId = startData.job_id;
                log(`Job Started (ID: ${jobId}). Waiting for completion...`);

                // 2. Poll Status
                const pollInterval = setInterval(async () => {
                    try {
                        const statusResp = await fetch(`/notifications/audit/status/${jobId}`);
                        const statusData = await statusResp.json();

                        if (statusData.status === 'running') {
                            btnAudit.innerText = `Processing ${statusData.percent}%`;
                            // Update log only on major steps to avoid spam
                            if(statusData.percent % 20 === 0) log(`Progress: ${statusData.percent}% - ${statusData.message}`);
                        } 
                        else if (statusData.status === 'complete') {
                            clearInterval(pollInterval);
                            btnAudit.innerText = "Start Audit Report";
                            btnAudit.disabled = false;
                            
                            log('Audit Complete! Downloading file...');
                            window.location.href = `/notifications/audit/download/${statusData.filename}`;
                        } 
                        else if (statusData.status === 'error') {
                            clearInterval(pollInterval);
                            btnAudit.disabled = false;
                            btnAudit.innerText = "Retry Audit";
                            log(`Error: ${statusData.message}`);
                        }
                    } catch (e) {
                        log(`Polling Error: ${e.message}`);
                    }
                }, 2000); // Check every 2 seconds

            } catch (e) {
                log(`System Error: ${e.message}`);
                btnAudit.disabled = false;
                btnAudit.innerText = "Start Audit Report";
            }
        });
    }
});
</script>
