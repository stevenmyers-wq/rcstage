<div class="container mt-4">
    <h3>Notification Auditor</h3>
    <p>Checks all user extensions for valid notification settings.</p>

    <div class="mb-3">
        <button id="btn-notifications-run" class="btn btn-primary">Start Audit</button>
        <button id="btn-notifications-stop" class="btn btn-danger" style="display:none;">Stop</button>
    </div>

    <div id="notifications-status-box" class="card bg-light mb-3" style="display:none;">
        <div class="card-body py-2">
            <div class="d-flex justify-content-between">
                <strong>Current Status:</strong>
                <span id="notifications-progress-text">0%</span>
            </div>
            <p id="notifications-current-action" class="text-primary mb-2">Ready</p>
            <div class="progress" style="height: 10px;">
                <div id="notifications-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Activity Log:</label>
        <textarea id="notifications-log" class="form-control font-monospace" rows="15" readonly></textarea>
    </div>
</div>

<script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
