<style>
    .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
    .table-container::-webkit-scrollbar-track { background: #f1f5f9; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .chevron { transition: transform 0.2s ease-in-out; }
    .chevron.open { transform: rotate(90deg); }
    
    .journey-timeline::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 20px;
        width: 2px;
        background-color: #e2e8f0;
    }
</style>

<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800 mb-1">Business Analytics Records</h2>
    <p class="text-slate-500 text-sm">Forensic end-to-end journey tracking. Sessions are automatically stitched by Call ID.</p>
</div>

<div class="flex flex-col xl:flex-row gap-6 items-start w-full">
    
    <div class="w-full xl:w-1/4 bg-white p-5 rounded shadow-sm border border-slate-200 flex-shrink-0">
        <h3 class="font-bold text-lg text-slate-800 mb-4">Time Range</h3>
        
        <form id="analyticsForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Start Date & Time</label>
                <input type="datetime-local" id="timeFrom" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">End Date & Time</label>
                <input type="datetime-local" id="timeTo" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-150 ease-in-out mt-2 shadow-sm">
                Fetch Full Journeys
            </button>
            
            <div id="errorMsg" class="text-red-500 text-xs font-medium hidden mt-2 p-2 bg-red-50 rounded border border-red-100"></div>
        </form>
    </div>

    <div class="w-full xl:w-3/4 bg-white rounded shadow-sm border border-slate-200 overflow-hidden min-w-0">
        <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
            <h3 class="font-bold text-slate-700">Unified Call Journeys</h3>
            <button onclick="exportToCSV()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-1.5 px-3 rounded hidden transition-colors" id="exportBtn">
                Export Summary
            </button>
        </div>
        
        <div class="table-container overflow-x-auto w-full">
            <table class="w-full text-sm text-left whitespace-nowrap">
                <thead class="text-xs text-slate-600 uppercase bg-slate-100 border-b border-slate-200">
                    <tr>
                        <th scope="col" class="px-4 py-3 w-8"></th>
                        <th scope="col" class="px-6 py-3">Start Time</th>
                        <th scope="col" class="px-6 py-3">Call ID</th>
                        <th scope="col" class="px-6 py-3">Originator</th>
                        <th scope="col" class="px-6 py-3 text-center">Total Hops</th>
                        <th scope="col" class="px-6 py-3 text-center">Final Result</th>
                        <th scope="col" class="px-6 py-3 text-center">Total Duration</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr>
                        <td colspan="7" class="px-6 py-12 text-center text-slate-400">
                            Select a time range and click "Fetch Full Journeys".
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. Initialize Dates
    (function() {
        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 1);
        const formatDt = (d) => {
            const tzOffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(d - tzOffset)).toISOString().slice(0, 16);
        };
        const fromInput = document.getElementById('timeFrom');
        const toInput = document.getElementById('timeTo');
        if (fromInput && toInput) {
            fromInput.value = formatDt(start);
            toInput.value = formatDt(end);
        }
    })();

    // 2. Fetch Logic
    document.getElementById('analyticsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const tableBody = document.getElementById('tableBody');
        const errorMsg = document.getElementById('errorMsg');
        const exportBtn = document.getElementById('exportBtn');
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = `Stitching...`;
        errorMsg.classList.add('hidden');
        exportBtn.classList.add('hidden');
        
        tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-blue-600 font-semibold animate-pulse">Querying broad records & reconstructing journeys...</td></tr>`;

        try {
            const response = await fetch('/api/analytics/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    timeFrom: new Date(document.getElementById('timeFrom').value).toISOString(),
                    timeTo: new Date(document.getElementById('timeTo').value).toISOString(),
                    timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data?.error || 'Failed to fetch.');

            renderTable(data);
            if (data?.data?.length > 0) exportBtn.classList.remove('hidden');
            
        } catch (error) {
            console.error("UI Error:", error);
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">Failed to render data. Check console.</td></tr>`;
            errorMsg.innerText = error.message;
            errorMsg.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Fetch Full Journeys';
        }
    });

    window.toggleDetails = (id) => {
        const d = document.getElementById(`details-${id}`);
        const c = document.getElementById(`chevron-${id}`);
        if (d && c) {
            d.classList.toggle('hidden');
            c.classList.toggle('open');
        }
    };

    function getStatusConfig(res) {
        const r = (res || '').toLowerCase();
        if (['completed', 'accepted', 'answered', 'pickedup'].includes(r)) return { text: 'text-green-700', bg: 'bg-green-100', dot: 'bg-green-500', border: 'border-green-200' };
        if (['missed', 'abandoned'].includes(r)) return { text: 'text-red-700', bg: 'bg-red-100', dot: 'bg-red-500', border: 'border-red-200' };
        if (['voicemail'].includes(r)) return { text: 'text-orange-700', bg: 'bg-orange-100', dot: 'bg-orange-500', border: 'border-orange-200' };
        if (['transferred', 'forwarded'].includes(r)) return { text: 'text-purple-700', bg: 'bg-purple-100', dot: 'bg-purple-500', border: 'border-purple-200' };
        return { text: 'text-slate-700', bg: 'bg-slate-100', dot: 'bg-slate-400', border: 'border-slate-200' };
    }

    function renderTable(payload) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        
        if (!payload?.data || payload.data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">No calls found.</td></tr>`;
            return;
        }

        // --- STITCHING ENGINE ---
        const grouped = {};
        payload.data.forEach(session => {
            const cid = session?.callId;
            if (!cid) return;
            if (!grouped[cid]) grouped[cid] = { callId: cid, hops: [] };
            if (session.hops) {
                session.hops.forEach(h => {
                    h.parentSessionId = session.sessionId || 'Unknown';
                    grouped[cid].hops.push(h);
                });
            }
        });

        const journeys = Object.values(grouped).map(j => {
            // De-duplicate hops and sort chronologically
            const uniqueHopsMap = new Map();
            j.hops.forEach(h => {
                const key = `${h.startedAt}-${h.from?.number}-${h.to?.number}`;
                if (!uniqueHopsMap.has(key)) uniqueHopsMap.set(key, h);
            });
            const sortedHops = Array.from(uniqueHopsMap.values()).sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
            return { ...j, hops: sortedHops };
        }).sort((a, b) => {
            const timeA = a.hops[0] ? new Date(a.hops[0].startedAt) : 0;
            const timeB = b.hops[0] ? new Date(b.hops[0].startedAt) : 0;
            return timeB - timeA;
        });

        journeys.forEach((j, idx) => {
            if (j.hops.length === 0) return;
            const first = j.hops[0], last = j.hops[j.hops.length - 1];

            // Forensic VM Detection
            let result = last.result || 'Unknown';
            const wentToVm = j.hops.some(h => h.result === 'Voicemail' || (h.segmentsDuration?.voicemail > 0 || h.segmentsDuration?.vmGreeting > 0));
            if (wentToVm) result = 'Voicemail';
            
            const totalDurMs = j.hops.reduce((s, h) => s + (h.duration || 0), 0);
            const conf = getStatusConfig(result);

            const row = document.createElement('tr');
            row.className = "hover:bg-blue-50 border-b cursor-pointer summary-row transition-colors";
            row.onclick = () => toggleDetails(idx);
            row.innerHTML = `
                <td class="px-4 py-4 text-slate-400"><svg id="chevron-${idx}" class="chevron w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></td>
                <td class="px-6 py-4 font-medium text-slate-700">${new Date(first.startedAt).toLocaleString()}</td>
                <td class="px-6 py-4 text-xs font-mono text-slate-500" title="${j.callId}">${j.callId.slice(0, 8)}...</td>
                <td class="px-6 py-4 font-semibold text-slate-800">${first.from?.name || first.from?.number || 'Unknown'}</td>
                <td class="px-6 py-4 text-center"><span class="bg-blue-50 text-blue-700 px-2.5 py-1 rounded-full text-xs font-bold border border-blue-100">${j.hops.length}</span></td>
                <td class="px-6 py-4 text-center"><span class="${conf.bg} ${conf.text} px-2.5 py-1 rounded-full text-xs font-bold border">${result}</span></td>
                <td class="px-6 py-4 text-center font-medium">${formatSeconds(totalDurMs/1000)}</td>
            `;
            tableBody.appendChild(row);

            const det = document.createElement('tr');
            det.id = `details-${idx}`;
            det.className = "hidden bg-slate-50 border-b-2 shadow-inner";
            let timeline = `<div class="p-8 max-w-5xl mx-auto relative journey-timeline">`;
            
            j.hops.forEach((h, hidx) => {
                const hConf = getStatusConfig(h.result);
                let segs = '';
                const segOrder = [
                    {k:'setup', l:'Setup'}, {k:'ivrPrompt', l:'IVR'}, {k:'ringing', l:'Ringing'}, 
                    {k:'liveTalk', l:'Talk'}, {k:'hold', l:'Hold'}, {k:'vmGreeting', l:'VM Greeting'}, {k:'voicemail', l:'Recording'}
                ];
                const active = segOrder.filter(o => h.segmentsDuration?.[o.k] > 0);
                if (active.length) {
                    segs = `<div class="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t border-slate-100">` + 
                           active.map(a => `<span class="bg-white border border-slate-200 text-[10px] px-2 py-1 rounded text-slate-600 shadow-sm"><b>${a.l}:</b> ${formatSeconds(h.segmentsDuration[a.k]/1000)}</span>`).join(' <span class="text-slate-300">➔</span> ') + 
                           `</div>`;
                }

                timeline += `
                    <div class="relative pl-10 pb-8 last:pb-0">
                        <div class="absolute left-[13px] top-1.5 w-4 h-4 rounded-full ${hConf.dot} border-[3px] border-white z-10 shadow-sm"></div>
                        <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start">
                                <div class="flex flex-col gap-1">
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] font-bold bg-slate-800 text-white px-2 py-0.5 rounded tracking-tighter">HOP ${hidx+1}</span>
                                        <span class="font-bold text-slate-900">${h.from?.number || 'Unknown'}</span> 
                                        <span class="text-slate-300">➔</span> 
                                        <span class="font-bold text-slate-900">${h.to?.name || h.to?.number || 'Unknown'}</span>
                                    </div>
                                    <div class="text-[9px] text-slate-400 font-mono">SID: ${h.parentSessionId.slice(0, 12)}...</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs font-black ${hConf.text} uppercase tracking-tight">${h.result}</div>
                                    <div class="text-[10px] text-slate-500 font-medium">${h.callType} • ${formatSeconds(h.duration/1000)}</div>
                                </div>
                            </div>
                            ${segs}
                        </div>
                    </div>`;
            });
            det.innerHTML = `<td colspan="7" class="p-0">${timeline}</div></td>`;
            tableBody.appendChild(det);
        });
    }

    function formatSeconds(s) {
        if (!s || s <= 0) return "0s";
        const m = Math.floor(s/60);
        const sec = Math.round(s%60);
        return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    }

    function exportToCSV() {
        let csv = "Start Time,Call ID,Originator,Hops,Result,Duration\n";
        document.querySelectorAll(".summary-row").forEach(r => {
            csv += Array.from(r.children).slice(1).map(c => `"${c.innerText.trim()}"`).join(",") + "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'RC_EndToEnd_Journeys.csv'; a.click();
    }
</script>
