<style>
    .table-container::-webkit-scrollbar { height: 8px; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .chevron { transition: transform 0.2s ease-in-out; }
    .chevron.open { transform: rotate(90deg); }
    .journey-timeline::before {
        content: ''; position: absolute; top: 0; bottom: 0;
        left: 20px; width: 2px; background-color: #e2e8f0;
    }
</style>

<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800">Business Analytics Records</h2>
    <p class="text-slate-500 text-sm">Forensic session logs via standard PKCE authentication.</p>
</div>

<div class="flex flex-col xl:flex-row gap-6 items-start w-full">
    <div class="w-full xl:w-1/4 bg-white p-5 rounded shadow-sm border border-slate-200 flex-shrink-0">
        <h3 class="font-bold text-lg text-slate-800 mb-4">Filters</h3>
        <form id="analyticsForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Dimension</label>
                <select id="dimension" class="w-full border border-slate-300 rounded p-2 text-sm">
                    <option value="Users">Users</option>
                    <option value="Queues">Call Queues</option>
                    <option value="Company">Entire Account</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Start Date</label>
                <input type="datetime-local" id="timeFrom" class="w-full border border-slate-300 rounded p-2 text-sm" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">End Date</label>
                <input type="datetime-local" id="timeTo" class="w-full border border-slate-300 rounded p-2 text-sm" required>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition">
                Fetch Records
            </button>
        </form>
    </div>

    <div class="w-full xl:w-3/4 bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-4 border-b border-slate-200 bg-slate-50">
            <h3 class="font-bold text-slate-700">Call Journey Logs</h3>
        </div>
        <div class="table-container overflow-x-auto w-full">
            <table class="w-full text-sm text-left">
                <thead class="text-xs text-slate-600 uppercase bg-slate-100 border-b">
                    <tr>
                        <th class="px-4 py-3"></th>
                        <th class="px-6 py-3">Start Time</th>
                        <th class="px-6 py-3">Originator</th>
                        <th class="px-6 py-3">Destination</th>
                        <th class="px-6 py-3 text-center">Result</th>
                        <th class="px-6 py-3 text-center">Duration</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">Fetch records to begin.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Initialize dates to yesterday
    (function() {
        const end = new Date(); const start = new Date(); start.setDate(end.getDate() - 1);
        const formatDt = (d) => {
            const tzOffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(d - tzOffset)).toISOString().slice(0, 16);
        };
        document.getElementById('timeFrom').value = formatDt(start);
        document.getElementById('timeTo').value = formatDt(end);
    })();

    document.getElementById('analyticsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const tableBody = document.getElementById('tableBody');
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = `Loading...`;
        tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-blue-600 font-semibold animate-pulse">Requesting from RingCentral...</td></tr>`;

        try {
            // Precise ISO formatting for the API (stripping MS)
            const tFrom = new Date(document.getElementById('timeFrom').value).toISOString().split('.')[0] + "Z";
            const tTo = new Date(document.getElementById('timeTo').value).toISOString().split('.')[0] + "Z";

            const response = await fetch('/api/analytics/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    timeFrom: tFrom,
                    timeTo: tTo,
                    dimension: document.getElementById('dimension').value,
                    timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
                })
            });

            const data = await response.json();
            renderTable(data);
            
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">Fetch failed.</td></tr>`;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Fetch Records';
        }
    });

    function renderTable(payload) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        
        if (!payload?.data?.length) {
            tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-500">No records found. Note: Analytics has a 2-4 hour delay.</td></tr>`;
            return;
        }

        payload.data.forEach((session, idx) => {
            const hops = session.hops || [];
            if (!hops.length) return;

            const first = hops[0], last = hops[hops.length - 1];
            const dur = Math.round(hops.reduce((s, h) => s + (h.duration || 0), 0) / 1000);

            const row = document.createElement('tr');
            row.className = "hover:bg-blue-50 border-b cursor-pointer transition-colors";
            row.onclick = () => {
                document.getElementById(`details-${idx}`).classList.toggle('hidden');
                document.getElementById(`chevron-${idx}`).classList.toggle('open');
            };
            row.innerHTML = `
                <td class="px-4 py-4"><svg id="chevron-${idx}" class="chevron w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></td>
                <td class="px-6 py-4 text-slate-700">${new Date(first.startedAt).toLocaleString()}</td>
                <td class="px-6 py-4 font-bold text-slate-800">${first.from?.number || 'Unknown'}</td>
                <td class="px-6 py-4 text-slate-600">${last.to?.name || last.to?.number || 'Unknown'}</td>
                <td class="px-6 py-3 text-center"><span class="bg-slate-100 text-slate-700 text-[10px] font-bold px-2 py-1 rounded border uppercase">${last.result || 'Done'}</span></td>
                <td class="px-6 py-3 text-center font-medium">${dur}s</td>
            `;
            tableBody.appendChild(row);

            const det = document.createElement('tr');
            det.id = `details-${idx}`;
            det.className = "hidden bg-slate-50";
            let timeline = `<div class="p-6 relative journey-timeline">`;
            hops.forEach((h, hidx) => {
                timeline += `
                    <div class="relative pl-10 pb-4 last:pb-0">
                        <div class="absolute left-[13px] top-1.5 w-4 h-4 rounded-full bg-blue-500 border-[3px] border-white z-10"></div>
                        <div class="bg-white border rounded p-3 shadow-sm">
                            <div class="flex justify-between text-xs">
                                <span class="font-bold">Hop ${hidx+1}: ${h.from?.number} ➔ ${h.to?.number}</span>
                                <span class="text-slate-400 uppercase font-black">${h.result}</span>
                            </div>
                        </div>
                    </div>`;
            });
            det.innerHTML = `<td colspan="6" class="p-0">${timeline}</div></td>`;
            tableBody.appendChild(det);
        });
    }
</script>
