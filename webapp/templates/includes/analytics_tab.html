<style>
    .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
    .table-container::-webkit-scrollbar-track { background: #f1f5f9; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* Chevron animation for accordion */
    .chevron { transition: transform 0.2s ease-in-out; }
    .chevron.open { transform: rotate(90deg); }
</style>

<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800 mb-1">Business Analytics Records</h2>
    <p class="text-slate-500 text-sm">Fetch granular, call-by-call logs and view end-to-end routing hops and segment durations.</p>
</div>

<div class="flex flex-col xl:flex-row gap-6 items-start w-full">
    
    <div class="w-full xl:w-1/4 bg-white p-5 rounded shadow-sm border border-slate-200">
        <h3 class="font-bold text-lg text-slate-800 mb-4">Report Parameters</h3>
        
        <form id="analyticsForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Dimension</label>
                <select id="dimension" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="Queues">Call Queues</option>
                    <option value="Users">Users</option>
                    <option value="Sites">Sites</option>
                    <option value="IVRs">IVR Menus</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Start Date & Time</label>
                <input type="datetime-local" id="timeFrom" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">End Date & Time</label>
                <input type="datetime-local" id="timeTo" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-150 ease-in-out mt-2">
                Fetch Call Flow Records
            </button>
            
            <div id="errorMsg" class="text-red-500 text-xs font-medium hidden mt-2"></div>
        </form>
    </div>

    <div class="w-full xl:w-3/4 bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
            <h3 class="font-bold text-slate-700">End-to-End Call Logs</h3>
            <button onclick="exportToCSV()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-1 px-3 rounded hidden" id="exportBtn">
                Export Summary CSV
            </button>
        </div>
        
        <div class="table-container overflow-x-auto w-full">
            <table class="w-full text-sm text-left whitespace-nowrap">
                <thead class="text-xs text-slate-600 uppercase bg-slate-100 border-b border-slate-200">
                    <tr>
                        <th scope="col" class="px-4 py-3 w-8"></th>
                        <th scope="col" class="px-6 py-3">Start Time</th>
                        <th scope="col" class="px-6 py-3">Call ID</th>
                        <th scope="col" class="px-6 py-3">Originator</th>
                        <th scope="col" class="px-6 py-3 text-center">Hops</th>
                        <th scope="col" class="px-6 py-3 text-center">Final Result</th>
                        <th scope="col" class="px-6 py-3 text-center">Total Duration</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-slate-400">
                            Select parameters and click "Fetch Call Flow Records" to view granular logs.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Initialize dates to Last 24 hours
    (function() {
        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 1);
        
        const formatDt = (d) => {
            const tzOffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(d - tzOffset)).toISOString().slice(0, 16);
        };
        
        const fromInput = document.getElementById('timeFrom');
        const toInput = document.getElementById('timeTo');
        
        if (fromInput && toInput) {
            fromInput.value = formatDt(start);
            toInput.value = formatDt(end);
        }
    })();

    document.getElementById('analyticsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const tableBody = document.getElementById('tableBody');
        const errorMsg = document.getElementById('errorMsg');
        const exportBtn = document.getElementById('exportBtn');
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'Fetching Call Flows...';
        errorMsg.classList.add('hidden');
        exportBtn.classList.add('hidden');
        
        tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-blue-600 font-semibold animate-pulse">Fetching end-to-end call records...</td></tr>`;

        const timeFrom = new Date(document.getElementById('timeFrom').value).toISOString();
        const timeTo = new Date(document.getElementById('timeTo').value).toISOString();
        const dimension = document.getElementById('dimension').value;
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        try {
            const response = await fetch('/api/analytics/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ timeFrom, timeTo, dimension, timeZone })
            });

            const data = await response.json();

            if (!response.ok) throw new Error(data.error || 'Failed to fetch call records.');

            renderTable(data);
            exportBtn.classList.remove('hidden');
            
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">Failed to load records.</td></tr>`;
            errorMsg.innerText = error.message;
            errorMsg.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Fetch Call Flow Records';
        }
    });

    // Global toggle function for accordion rows
    window.toggleDetails = function(rowId) {
        const detailsRow = document.getElementById(`details-${rowId}`);
        const chevron = document.getElementById(`chevron-${rowId}`);
        if (detailsRow.classList.contains('hidden')) {
            detailsRow.classList.remove('hidden');
            chevron.classList.add('open');
        } else {
            detailsRow.classList.add('hidden');
            chevron.classList.remove('open');
        }
    };

    function renderTable(data) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        if (!data.data || data.data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">No calls found for this date range.</td></tr>`;
            return;
        }

        data.data.forEach((record, index) => {
            const hops = record.hops || [];
            if (hops.length === 0) return;

            const firstHop = hops[0];
            const lastHop = hops[hops.length - 1];
            
            const startTime = new Date(firstHop.startedAt).toLocaleString();
            const shortCallId = record.callId ? record.callId.substring(0, 10) + '...' : '-';
            
            // Overall Originator
            const originator = (firstHop.from && (firstHop.from.name || firstHop.from.number || firstHop.from.extensionNumber)) || 'Unknown';
            
            // Final Result of the whole call is usually determined by the last hop
            const finalResult = lastHop.result || firstHop.result || '-';
            
            // Calculate total duration across all hops
            const totalDurationMs = hops.reduce((sum, h) => sum + (h.duration || 0), 0);
            const totalDurationFmt = formatSeconds(totalDurationMs / 1000);

            // Coloring for final result
            let resultColor = "text-slate-700";
            if (["Completed", "Accepted", "Answered"].includes(finalResult)) resultColor = "text-green-600 font-medium";
            if (["Missed", "Abandoned"].includes(finalResult)) resultColor = "text-red-600 font-medium";
            if (finalResult === "Voicemail") resultColor = "text-orange-500 font-medium";

            const rowClass = index % 2 === 0 ? "bg-white" : "bg-slate-50";

            // Main Row (Summary)
            const trMain = document.createElement('tr');
            trMain.className = `${rowClass} hover:bg-blue-50 border-b border-slate-100 cursor-pointer summary-row`;
            trMain.setAttribute('onclick', `toggleDetails(${index})`);
            trMain.innerHTML = `
                <td class="px-4 py-3 text-slate-400">
                    <svg id="chevron-${index}" class="chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </td>
                <td class="px-6 py-3">${startTime}</td>
                <td class="px-6 py-3 text-slate-500 font-mono text-xs" title="${record.callId}">${shortCallId}</td>
                <td class="px-6 py-3 font-medium text-slate-700">${originator}</td>
                <td class="px-6 py-3 text-center"><span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded-full">${hops.length}</span></td>
                <td class="px-6 py-3 text-center ${resultColor}">${finalResult}</td>
                <td class="px-6 py-3 text-center font-semibold text-slate-700">${totalDurationFmt}</td>
            `;
            tableBody.appendChild(trMain);

            // Details Row (Hops & Segments)
            const trDetails = document.createElement('tr');
            trDetails.id = `details-${index}`;
            trDetails.className = `hidden bg-slate-100 border-b border-slate-200`;
            
            let hopsHtml = `<div class="p-4 w-full flex flex-col space-y-3">`;
            
            hops.forEach((hop, hIndex) => {
                const hFrom = (hop.from && (hop.from.name || hop.from.number || hop.from.extensionNumber)) || 'Unknown';
                const hTo = (hop.to && (hop.to.name || hop.to.number || hop.to.extensionNumber)) || 'Unknown';
                const hType = hop.callType || 'Call';
                const hResult = hop.result || '-';
                const hDur = formatSeconds((hop.duration || 0) / 1000);
                
                // Build Segments Badges
                let segmentsHtml = '';
                if (hop.segmentsDuration) {
                    const segs = hop.segmentsDuration;
                    const segmentsToDisplay = [];
                    // Map API keys to readable labels and colors
                    const segMap = [
                        { key: 'setup', label: 'Setup', color: 'bg-slate-200 text-slate-700' },
                        { key: 'ivrPrompt', label: 'IVR Prompt', color: 'bg-indigo-100 text-indigo-800' },
                        { key: 'ringing', label: 'Ringing', color: 'bg-yellow-100 text-yellow-800' },
                        { key: 'liveTalk', label: 'Talk', color: 'bg-green-100 text-green-800' },
                        { key: 'hold', label: 'Hold', color: 'bg-red-100 text-red-800' },
                        { key: 'park', label: 'Park', color: 'bg-orange-100 text-orange-800' },
                        { key: 'transfer', label: 'Transfer', color: 'bg-purple-100 text-purple-800' },
                        { key: 'vmGreeting', label: 'VM Greeting', color: 'bg-pink-100 text-pink-800' },
                        { key: 'voicemail', label: 'Voicemail (Rec)', color: 'bg-rose-100 text-rose-800' }
                    ];

                    segMap.forEach(s => {
                        if (segs[s.key] && segs[s.key] > 0) {
                            segmentsToDisplay.push(`<span class="${s.color} text-[10px] font-semibold px-2 py-0.5 rounded border border-white/20">${s.label}: ${formatSeconds(segs[s.key]/1000)}</span>`);
                        }
                    });

                    if (segmentsToDisplay.length > 0) {
                        segmentsHtml = `<div class="flex flex-wrap gap-1 mt-2">${segmentsToDisplay.join('')}</div>`;
                    }
                }

                hopsHtml += `
                    <div class="bg-white border border-slate-200 rounded p-3 shadow-sm ml-6 relative">
                        <div class="absolute -left-3 top-4 w-3 h-0.5 bg-slate-300"></div>
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-xs font-bold uppercase tracking-wider text-slate-400 mr-2">Hop ${hIndex + 1}</span>
                                <span class="font-medium text-slate-800 text-sm">${hFrom}</span>
                                <span class="text-slate-400 mx-1">➔</span>
                                <span class="font-medium text-slate-800 text-sm">${hTo}</span>
                            </div>
                            <div class="text-right">
                                <div class="text-xs font-semibold text-slate-500">${hType} • ${hResult}</div>
                                <div class="text-xs text-slate-400">${hDur}</div>
                            </div>
                        </div>
                        ${segmentsHtml}
                    </div>
                `;
            });
            
            hopsHtml += `</div>`;
            trDetails.innerHTML = `<td colspan="7" class="p-0">${hopsHtml}</td>`;
            tableBody.appendChild(trDetails);
        });
    }

    function formatSeconds(sec) {
        if (!sec || sec <= 0) return "0s";
        const m = Math.floor(sec / 60);
        const s = Math.round(sec % 60);
        return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function exportToCSV() {
        // Only exports the main summary rows to keep CSV flat
        const rows = document.querySelectorAll("table tr.summary-row");
        let csvContent = "Start Time,Call ID,Originator,Total Hops,Final Result,Total Duration\r\n";
        
        rows.forEach(row => {
            const cols = row.querySelectorAll("td");
            if (cols.length > 1) { 
                // Skip the chevron column (index 0)
                const rowData = Array.from(cols).slice(1).map(col => {
                    let text = col.getAttribute("title") || col.innerText;
                    return `"${text}"`;
                }).join(",");
                csvContent += rowData + "\r\n";
            }
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "RC_CallFlow_Summary.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
