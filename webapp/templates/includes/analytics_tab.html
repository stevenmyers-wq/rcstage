<style>
    .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .chevron { transition: transform 0.2s ease-in-out; }
    .chevron.open { transform: rotate(90deg); }
    .journey-timeline::before {
        content: ''; position: absolute; top: 0; bottom: 0; left: 20px;
        width: 2px; background-color: #e2e8f0;
    }
</style>

<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800 mb-1">Business Analytics Records</h2>
    <p class="text-slate-500 text-sm italic">Secure Admin Impersonation Mode</p>
</div>

<div class="flex flex-col xl:flex-row gap-6 items-start w-full">
    
    <div class="w-full xl:w-1/4 bg-white p-5 rounded shadow-sm border border-slate-200">
        
        <div id="authGate">
            <h3 class="font-bold text-xs text-slate-800 mb-4 uppercase tracking-widest">Identify Target</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-1">RINGCENTRAL ACCOUNT ID</label>
                    <input type="text" id="targetAccountId" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-black outline-none" placeholder="Enter ID (e.g. 8033...)">
                </div>
                <button type="button" id="connectBtn" onclick="runAuth()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-2 rounded text-xs transition-all">
                    VALIDATE & UNLOCK
                </button>
            </div>
        </div>

        <div id="paramControls" style="display: none;">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                <span class="text-[10px] font-bold text-green-600 uppercase">● Session Active</span>
                <button onclick="location.reload()" class="text-[10px] text-slate-400 hover:text-red-500 font-bold">RESET</button>
            </div>
            
            <form id="analyticsForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">DIMENSION</label>
                    <select id="dimension" class="w-full border border-slate-300 rounded p-2 text-sm">
                        <option value="Queues">Call Queues</option>
                        <option value="Users">Users</option>
                        <option value="Sites">Sites</option>
                        <option value="IVRs">IVR Menus</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">START DATE</label>
                    <input type="datetime-local" id="timeFrom" class="w-full border border-slate-300 rounded p-2 text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">END DATE</label>
                    <input type="datetime-local" id="timeTo" class="w-full border border-slate-300 rounded p-2 text-sm" required>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded shadow-sm transition">
                    FETCH ANALYTICS
                </button>
            </form>
        </div>
        <div id="sideError" class="hidden mt-4 p-2 text-[11px] bg-red-50 text-red-600 border border-red-100 rounded"></div>
    </div>

    <div class="w-full xl:w-3/4 bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
        <div id="uiLockout" class="p-20 text-center bg-slate-50/50">
            <svg class="mx-auto h-12 w-12 text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2-2V7a4 4 0 00-8 0v4h8z" /></svg>
            <p class="text-slate-400 font-medium">Please authenticate a Target Account ID to view data.</p>
        </div>

        <div id="dataTable" class="hidden">
            <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <h3 id="tableTitle" class="font-bold text-slate-700 text-sm uppercase tracking-tight">Records</h3>
                <button onclick="exportToCSV()" id="exportBtn" class="hidden bg-green-600 text-white text-[10px] font-bold py-1 px-3 rounded">EXPORT CSV</button>
            </div>
            <div class="table-container overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-[10px] text-slate-500 uppercase bg-slate-100 border-b">
                        <tr>
                            <th class="px-4 py-3"></th>
                            <th class="px-6 py-3">Start Time</th>
                            <th class="px-6 py-3">Call ID</th>
                            <th class="px-6 py-3">Originator</th>
                            <th class="px-6 py-3 text-center">Hops</th>
                            <th class="px-6 py-3 text-center">Result</th>
                            <th class="px-6 py-3 text-center">Duration</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. AUTHENTICATION LOGIC
    async function runAuth() {
        const id = document.getElementById('targetAccountId').value.trim();
        const btn = document.getElementById('connectBtn');
        const err = document.getElementById('sideError');
        if(!id) return;
        
        btn.disabled = true; btn.innerText = 'Verifying...'; err.classList.add('hidden');
        
        try {
            const r = await fetch('/api/analytics/validate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({targetAccountId: id})
            });
            const d = await r.json();
            if(!r.ok) throw new Error(d.error);

            document.getElementById('authGate').style.display = 'none';
            document.getElementById('paramControls').style.display = 'block';
            document.getElementById('uiLockout').classList.add('hidden');
            document.getElementById('dataTable').classList.remove('hidden');
            document.getElementById('tableTitle').innerText = `Records for Account: ${id}`;
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="py-20 text-center text-slate-400">Ready to analyze. Select a timeframe.</td></tr>`;
        } catch(e) {
            err.innerText = e.message; err.classList.remove('hidden');
        } finally {
            btn.disabled = false; btn.innerText = 'VALIDATE & UNLOCK';
        }
    }

    // 2. FETCH RECORDS LOGIC
    document.getElementById('analyticsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const sBtn = document.getElementById('submitBtn');
        const tBody = document.getElementById('tableBody');
        sBtn.disabled = true; sBtn.innerText = 'Loading...';

        const payload = {
            targetAccountId: document.getElementById('targetAccountId').value,
            timeFrom: new Date(document.getElementById('timeFrom').value).toISOString(),
            timeTo: new Date(document.getElementById('timeTo').value).toISOString(),
            dimension: document.getElementById('dimension').value,
            timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
        };

        try {
            const r = await fetch('/api/analytics/records', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const d = await r.json();
            if(!r.ok) throw new Error(d.error);
            renderTable(d);
            document.getElementById('exportBtn').classList.remove('hidden');
        } catch(e) {
            tBody.innerHTML = `<tr><td colspan="7" class="py-10 text-center text-red-400">${e.message}</td></tr>`;
        } finally {
            sBtn.disabled = false; sBtn.innerText = 'RUN ANALYSIS';
        }
    });

    // 3. UI RENDERING HELPERS (Original logic preserved)
    function renderTable(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        if(!data.data || data.data.length === 0) {
            body.innerHTML = '<tr><td colspan="7" class="py-20 text-center text-slate-400">No records found for this period.</td></tr>';
            return;
        }

        data.data.forEach((rec, idx) => {
            const hops = rec.hops || [];
            if(hops.length === 0) return;
            const first = hops[0]; const last = hops[hops.length-1];
            const result = last.result || 'Unknown';
            const resCfg = getStatusConfig(result);
            const dur = formatSeconds(hops.reduce((s, h) => s + (h.duration || 0), 0) / 1000);

            const row = document.createElement('tr');
            row.className = "hover:bg-slate-50 cursor-pointer border-b transition-colors";
            row.onclick = () => toggleDetails(idx);
            row.innerHTML = `
                <td class="px-4 py-4"><svg id="chevron-${idx}" class="chevron w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 5l7 7-7 7"/></svg></td>
                <td class="px-6 py-4 font-medium text-slate-600">${new Date(first.startedAt).toLocaleString()}</td>
                <td class="px-6 py-4 font-mono text-[10px] text-slate-400">${rec.callId.substring(0,8)}...</td>
                <td class="px-6 py-4 font-bold text-slate-700">${first.from?.name || first.from?.number || 'Unknown'}</td>
                <td class="px-6 py-4 text-center"><span class="bg-slate-100 px-2 py-0.5 rounded-full text-[10px] font-bold">${hops.length}</span></td>
                <td class="px-6 py-4 text-center"><span class="${resCfg.bg} ${resCfg.text} text-[10px] font-black px-2 py-0.5 rounded-full">${result}</span></td>
                <td class="px-6 py-4 text-center font-bold text-slate-700">${dur}</td>
            `;
            body.appendChild(row);

            const detailRow = document.createElement('tr');
            detailRow.id = `details-${idx}`;
            detailRow.className = "hidden bg-slate-50/50";
            let hopList = '<td colspan="7" class="p-6 relative journey-timeline space-y-4">';
            hops.forEach((h, hidx) => {
                const hCfg = getStatusConfig(h.result);
                hopList += `
                    <div class="relative pl-8">
                        <div class="absolute left-[14px] top-1.5 w-3 h-3 rounded-full ${hCfg.dot} border-2 border-white z-10"></div>
                        <div class="bg-white border p-3 rounded-lg shadow-sm flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-700">Hop ${hidx+1}: ${h.from?.name || 'In'} ➔ ${h.to?.name || 'Out'}</span>
                            <span class="text-[10px] font-bold ${hCfg.text}">${h.result} (${formatSeconds(h.duration/1000)})</span>
                        </div>
                    </div>`;
            });
            detailRow.innerHTML = hopList + '</td>';
            body.appendChild(detailRow);
        });
    }

    function toggleDetails(i) {
        const d = document.getElementById(`details-${i}`);
        const c = document.getElementById(`chevron-${i}`);
        d.classList.toggle('hidden');
        c.classList.toggle('open');
    }

    function getStatusConfig(r) {
        const s = (r || '').toLowerCase();
        if(['completed','answered','accepted'].includes(s)) return {text:'text-green-600', bg:'bg-green-50', dot:'bg-green-500'};
        if(['missed','abandoned'].includes(s)) return {text:'text-red-600', bg:'bg-red-50', dot:'bg-red-500'};
        return {text:'text-slate-500', bg:'bg-slate-50', dot:'bg-slate-400'};
    }

    function formatSeconds(s) {
        if(!s || s<=0) return "0s";
        const m = Math.floor(s/60); const sec = Math.round(s%60);
        return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    }

    function exportToCSV() {
        // Simple CSV implementation
        const rows = document.querySelectorAll("#tableBody tr:not(.hidden)");
        let csv = "Time,CallID,From,Hops,Result,Duration\n";
        rows.forEach(r => {
            const c = r.querySelectorAll('td');
            if(c.length > 1) csv += `"${c[1].innerText}","${c[2].innerText}","${c[3].innerText}","${c[4].innerText}","${c[5].innerText}","${c[6].innerText}"\n`;
        });
        const blob = new Blob([csv], {type:'text/csv'});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'analytics.csv'; a.click();
    }
</script>
