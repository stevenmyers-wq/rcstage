<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RingEX Business Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans antialiased p-8">

    <div class="max-w-7xl mx-auto">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-800 mb-1">RingEX Business Analytics</h1>
            <p class="text-slate-500 text-sm">Generate holistic call aggregation and performance reports.</p>
        </div>
        
        <div class="flex flex-col md:flex-row gap-6 items-start">
            
            <!-- Sidebar / Controls -->
            <div class="w-full md:w-1/4 bg-white p-5 rounded shadow-sm border border-slate-200">
                <h2 class="font-bold text-lg text-slate-800 mb-4">Report Parameters</h2>
                
                <form id="analyticsForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Dimension</label>
                        <select id="groupBy" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                            <option value="Queues">Call Queues</option>
                            <option value="Users">Users</option>
                            <option value="Sites">Sites</option>
                            <option value="IVRs">IVR Menus</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Start Date & Time</label>
                        <input type="datetime-local" id="timeFrom" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">End Date & Time</label>
                        <input type="datetime-local" id="timeTo" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500" required>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-150 ease-in-out mt-2">
                        Generate Report
                    </button>
                    
                    <div id="errorMsg" class="text-red-500 text-xs font-medium hidden mt-2"></div>
                </form>
            </div>

            <!-- Main Data Table -->
            <div class="w-full md:w-3/4 bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-700">Aggregation Results</h3>
                    <button onclick="exportToCSV()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-1 px-3 rounded hidden" id="exportBtn">
                        Export CSV
                    </button>
                </div>
                
                <div class="table-container overflow-x-auto w-full">
                    <table class="w-full text-sm text-left whitespace-nowrap">
                        <thead class="text-xs text-white uppercase bg-slate-800">
                            <tr>
                                <th scope="col" class="px-6 py-3">Target Name</th>
                                <th scope="col" class="px-6 py-3 text-center">Total Calls</th>
                                <th scope="col" class="px-6 py-3 text-center">Answered</th>
                                <th scope="col" class="px-6 py-3 text-center">Missed</th>
                                <th scope="col" class="px-6 py-3 text-center">Abandoned</th>
                                <th scope="col" class="px-6 py-3 text-center">Voicemail</th>
                                <th scope="col" class="px-6 py-3 text-center">Avg Duration</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="7" class="px-6 py-8 text-center text-slate-400">
                                    Select parameters and click "Generate Report" to view analytics.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Set default dates (Last 7 days)
        document.addEventListener("DOMContentLoaded", () => {
            const end = new Date();
            const start = new Date();
            start.setDate(end.getDate() - 7);
            
            const formatDt = (d) => {
                const tzOffset = (new Date()).getTimezoneOffset() * 60000;
                return (new Date(d - tzOffset)).toISOString().slice(0, 16);
            };
            
            document.getElementById('timeFrom').value = formatDt(start);
            document.getElementById('timeTo').value = formatDt(end);
        });

        // Handle form submission
        document.getElementById('analyticsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const tableBody = document.getElementById('tableBody');
            const errorMsg = document.getElementById('errorMsg');
            const exportBtn = document.getElementById('exportBtn');
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'Fetching Data...';
            errorMsg.classList.add('hidden');
            exportBtn.classList.add('hidden');
            
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-blue-600 font-semibold animate-pulse">Querying RingCentral Analytics...</td></tr>`;

            const timeFrom = new Date(document.getElementById('timeFrom').value).toISOString();
            const timeTo = new Date(document.getElementById('timeTo').value).toISOString();
            const groupBy = document.getElementById('groupBy').value;
            const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;

            try {
                const response = await fetch('/api/analytics/aggregation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ timeFrom, timeTo, groupBy, timeZone })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Failed to fetch analytics.');

                renderTable(data);
                exportBtn.classList.remove('hidden');
                
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">Failed to load data.</td></tr>`;
                errorMsg.innerText = error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Generate Report';
            }
        });

        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            if (!data.data || !data.data.records || data.data.records.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">No calls found for this date range.</td></tr>`;
                return;
            }

            data.data.records.forEach((record, index) => {
                const name = record.info && record.info.name ? record.info.name : `ID: ${record.key}`;
                const ext = record.info && record.info.extensionNumber ? ` (Ext ${record.info.extensionNumber})` : '';
                
                const total = record.counters?.allCalls?.values || 0;
                const results = record.counters?.callsByResult?.values || {};
                
                const answered = (results.completed || 0) + (results.accepted || 0);
                const missed = results.missed || 0;
                const abandoned = results.abandoned || 0;
                const voicemail = results.voicemail || 0;

                const avgDurSecs = record.timers?.allCallsDuration?.values || 0;
                const durationFmt = formatSeconds(avgDurSecs);

                const rowClass = index % 2 === 0 ? "bg-white" : "bg-slate-50";

                const tr = document.createElement('tr');
                tr.className = `${rowClass} hover:bg-blue-50 border-b border-slate-100`;
                tr.innerHTML = `
                    <td class="px-6 py-4 font-medium text-slate-800">${name}${ext}</td>
                    <td class="px-6 py-4 text-center">${total}</td>
                    <td class="px-6 py-4 text-center text-green-600 font-medium">${answered}</td>
                    <td class="px-6 py-4 text-center text-red-600">${missed}</td>
                    <td class="px-6 py-4 text-center text-orange-500">${abandoned}</td>
                    <td class="px-6 py-4 text-center text-slate-600">${voicemail}</td>
                    <td class="px-6 py-4 text-center">${durationFmt}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function formatSeconds(sec) {
            if (!sec) return "0s";
            const m = Math.floor(sec / 60);
            const s = Math.round(sec % 60);
            return m > 0 ? `${m}m ${s}s` : `${s}s`;
        }

        function exportToCSV() {
            const rows = document.querySelectorAll("table tr");
            let csvContent = "";
            
            rows.forEach(row => {
                const cols = row.querySelectorAll("td, th");
                const rowData = Array.from(cols).map(col => `"${col.innerText}"`).join(",");
                csvContent += rowData + "\r\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "RC_Analytics_Report.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
