<style>
    .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
    .table-container::-webkit-scrollbar-track { background: #f1f5f9; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .chevron { transition: transform 0.2s ease-in-out; }
    .chevron.open { transform: rotate(90deg); }
    .journey-timeline::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 20px;
        width: 2px;
        background-color: #e2e8f0;
    }
</style>

<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800 mb-1">Business Analytics Records</h2>
    <p class="text-slate-500 text-sm">Forensic end-to-end call journey tracking across multiple sessions.</p>
</div>

<div class="flex flex-col xl:flex-row gap-6 items-start w-full">
    <div class="w-full xl:w-1/4 bg-white p-5 rounded shadow-sm border border-slate-200 flex-shrink-0">
        <h3 class="font-bold text-lg text-slate-800 mb-4">Report Parameters</h3>
        <form id="analyticsForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Dimension</label>
                <select id="dimension" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500">
                    <option value="Queues">Call Queues</option>
                    <option value="Users">Users</option>
                    <option value="Sites">Sites</option>
                    <option value="IVRs">IVR Menus</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Start Date & Time</label>
                <input type="datetime-local" id="timeFrom" class="w-full border border-slate-300 rounded p-2 text-sm" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">End Date & Time</label>
                <input type="datetime-local" id="timeTo" class="w-full border border-slate-300 rounded p-2 text-sm" required>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition mt-2">
                Fetch Full Journeys
            </button>
            <div id="errorMsg" class="text-red-500 text-xs font-medium hidden mt-2 p-2 bg-red-50 rounded border border-red-100"></div>
        </form>
    </div>

    <div class="w-full xl:w-3/4 bg-white rounded shadow-sm border border-slate-200 overflow-hidden min-w-0">
        <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
            <h3 class="font-bold text-slate-700">Unified Call Journeys</h3>
            <button onclick="exportToCSV()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-1.5 px-3 rounded hidden" id="exportBtn">Export Summary</button>
        </div>
        <div class="table-container overflow-x-auto w-full">
            <table class="w-full text-sm text-left whitespace-nowrap">
                <thead class="text-xs text-slate-600 uppercase bg-slate-100 border-b">
                    <tr>
                        <th class="px-4 py-3 w-8"></th>
                        <th class="px-6 py-3">Start Time</th>
                        <th class="px-6 py-3">Call ID</th>
                        <th class="px-6 py-3">Originator</th>
                        <th class="px-6 py-3 text-center">Total Hops</th>
                        <th class="px-6 py-3 text-center">Final Result</th>
                        <th class="px-6 py-3 text-center">Total Duration</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="7" class="px-6 py-12 text-center text-slate-400">Select parameters and fetch records.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. Initial Dates
    (function() {
        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 1);
        const formatDt = (d) => {
            const tzOffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(d - tzOffset)).toISOString().slice(0, 16);
        };
        document.getElementById('timeFrom').value = formatDt(start);
        document.getElementById('timeTo').value = formatDt(end);
    })();

    // 2. Fetch Logic
    document.getElementById('analyticsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const tableBody = document.getElementById('tableBody');
        const errorMsg = document.getElementById('errorMsg');
        const exportBtn = document.getElementById('exportBtn');
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = `Fetching...`;
        errorMsg.classList.add('hidden');
        
        tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-blue-600 font-semibold animate-pulse">Querying & Stitching End-to-End Journeys...</td></tr>`;

        try {
            const response = await fetch('/api/analytics/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    timeFrom: new Date(document.getElementById('timeFrom').value).toISOString(),
                    timeTo: new Date(document.getElementById('timeTo').value).toISOString(),
                    dimension: document.getElementById('dimension').value,
                    timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data?.error || 'Failed to fetch.');

            renderTable(data);
            if (data?.data?.length > 0) exportBtn.classList.remove('hidden');
            
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">Error loading records.</td></tr>`;
            errorMsg.innerText = error.message;
            errorMsg.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Fetch Full Journeys';
        }
    });

    window.toggleDetails = (id) => {
        const d = document.getElementById(`details-${id}`);
        const c = document.getElementById(`chevron-${id}`);
        d.classList.toggle('hidden');
        c.classList.toggle('open');
    };

    function getStatusConfig(res) {
        const r = (res || '').toLowerCase();
        if (['completed', 'accepted', 'answered', 'pickedup'].includes(r)) return { text: 'text-green-700', bg: 'bg-green-100', dot: 'bg-green-500', border: 'border-green-200' };
        if (['missed', 'abandoned'].includes(r)) return { text: 'text-red-700', bg: 'bg-red-100', dot: 'bg-red-500', border: 'border-red-200' };
        if (['voicemail'].includes(r)) return { text: 'text-orange-700', bg: 'bg-orange-100', dot: 'bg-orange-500', border: 'border-orange-200' };
        return { text: 'text-slate-700', bg: 'bg-slate-100', dot: 'bg-slate-400', border: 'border-slate-200' };
    }

    function renderTable(payload) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        if (!payload?.data?.length) {
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">No calls found.</td></tr>`;
            return;
        }

        // --- STITCHING ENGINE ---
        const grouped = {};
        payload.data.forEach(session => {
            const cid = session.callId;
            if (!grouped[cid]) grouped[cid] = { callId: cid, hops: [] };
            if (session.hops) grouped[cid].hops.push(...session.hops);
        });

        const journeys = Object.values(grouped).map(j => {
            // Remove duplicates and sort
            const uniqueHops = Array.from(new Map(j.hops.map(h => [h.startedAt + h.from?.number + h.to?.number, h])).values());
            uniqueHops.sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
            return { ...j, hops: uniqueHops };
        }).sort((a, b) => new Date(b.hops[0]?.startedAt) - new Date(a.hops[0]?.startedAt));

        journeys.forEach((j, idx) => {
            const first = j.hops[0], last = j.hops[j.hops.length - 1];
            if (!first) return;

            let result = last.result || 'Unknown';
            if (j.hops.some(h => h.segmentsDuration?.voicemail > 0)) result = 'Voicemail';
            
            const dur = formatSeconds(j.hops.reduce((s, h) => s + (h.duration || 0), 0) / 1000);
            const conf = getStatusConfig(result);

            const row = document.createElement('tr');
            row.className = "hover:bg-blue-50 border-b cursor-pointer summary-row";
            row.onclick = () => toggleDetails(idx);
            row.innerHTML = `
                <td class="px-4 py-4 text-slate-400"><svg id="chevron-${idx}" class="chevron w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></td>
                <td class="px-6 py-4 font-medium">${new Date(first.startedAt).toLocaleString()}</td>
                <td class="px-6 py-4 text-xs font-mono text-slate-500">${j.callId.slice(0, 10)}...</td>
                <td class="px-6 py-4 font-semibold">${first.from?.name || first.from?.number || 'Unknown'}</td>
                <td class="px-6 py-4 text-center"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded-full text-xs font-bold">${j.hops.length}</span></td>
                <td class="px-6 py-4 text-center"><span class="${conf.bg} ${conf.text} px-2.5 py-1 rounded-full text-xs font-bold">${result}</span></td>
                <td class="px-6 py-4 text-center font-medium">${dur}</td>
            `;
            tableBody.appendChild(row);

            const det = document.createElement('tr');
            det.id = `details-${idx}`;
            det.className = "hidden bg-slate-50 border-b-2 shadow-inner";
            let timeline = `<div class="p-6 max-w-5xl mx-auto relative journey-timeline">`;
            
            j.hops.forEach((h, hidx) => {
                const hConf = getStatusConfig(h.result);
                let segs = '';
                const order = [
                    {k:'setup', l:'Setup'}, {k:'ivrPrompt', l:'IVR'}, {k:'ringing', l:'Ringing'}, 
                    {k:'liveTalk', l:'Talk'}, {k:'hold', l:'Hold'}, {k:'vmGreeting', l:'VM Greeting'}, {k:'voicemail', l:'Voicemail'}
                ];
                const active = order.filter(o => h.segmentsDuration?.[o.k] > 0);
                if (active.length) {
                    segs = `<div class="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t">` + 
                           active.map(a => `<span class="bg-white border text-[10px] px-2 py-1 rounded"><b>${a.l}:</b> ${formatSeconds(h.segmentsDuration[a.k]/1000)}</span>`).join(' ➔ ') + 
                           `</div>`;
                }

                timeline += `
                    <div class="relative pl-10 pb-6 last:pb-0">
                        <div class="absolute left-[13px] top-1.5 w-4 h-4 rounded-full ${hConf.dot} border-[3px] border-white z-10"></div>
                        <div class="bg-white border rounded-lg p-4 shadow-sm">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold bg-slate-100 px-1.5 rounded">HOP ${hidx+1}</span>
                                    <span class="font-bold">${h.from?.number || 'Unknown'}</span> ➔ <span class="font-bold">${h.to?.name || h.to?.number || 'Unknown'}</span>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs font-bold ${hConf.text}">${h.result} (${h.callType})</div>
                                    <div class="text-[10px] text-slate-400">${formatSeconds(h.duration/1000)}</div>
                                </div>
                            </div>
                            ${segs}
                        </div>
                    </div>`;
            });
            det.innerHTML = `<td colspan="7" class="p-0">${timeline}</div></td>`;
            tableBody.appendChild(det);
        });
    }

    function formatSeconds(s) {
        if (!s || s <= 0) return "0s";
        const m = Math.floor(s/60);
        const sec = Math.round(s%60);
        return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    }

    function exportToCSV() {
        let csv = "Start Time,Call ID,Originator,Hops,Result,Duration\n";
        document.querySelectorAll(".summary-row").forEach(r => {
            csv += Array.from(r.children).slice(1).map(c => `"${c.innerText.trim()}"`).join(",") + "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'RC_Journeys.csv'; a.click();
    }
</script>
