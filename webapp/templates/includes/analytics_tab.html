<style>
    .journey-timeline::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 20px;
        width: 2px;
        @apply bg-slate-200 dark:bg-slate-700/50;
    }
</style>

<div class="space-y-8 animate-fade-in w-full">
    <div class="mb-4">
        <h2 class="text-display mb-2">Business Analytics Records</h2>
        <p class="text-subheading">Fetch granular, call-by-call logs to view end-to-end routing journeys and segment breakdowns.</p>
    </div>

    <div class="flex flex-col xl:flex-row gap-8 items-start w-full">
        
        <div class="w-full xl:w-1/4 card flex-shrink-0 sticky top-4">
            <h3 class="text-heading mb-6">Report Parameters</h3>
            
            <form id="analyticsForm" class="space-y-5">
                <div class="input-wrapper">
                    <label class="input-label">Dimension</label>
                    <select id="dimension" class="input-field">
                        <option value="Queues">Call Queues</option>
                        <option value="Users">Users</option>
                        <option value="Sites">Sites</option>
                        <option value="IVRs">IVR Menus</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <label class="input-label">Start Date & Time</label>
                    <input type="datetime-local" id="timeFrom" class="input-field" required>
                </div>

                <div class="input-wrapper">
                    <label class="input-label">End Date & Time</label>
                    <input type="datetime-local" id="timeTo" class="input-field" required>
                </div>

                <div class="pt-2">
                    <button type="submit" id="submitBtn" class="btn-primary w-full !py-3.5">
                        Fetch Call Flow Records
                    </button>
                </div>
                
                <div id="errorMsg" class="hidden text-rose-600 dark:text-rose-400 text-xs font-bold p-3 bg-rose-50 dark:bg-rose-900/20 rounded-xl border border-rose-200 dark:border-rose-800 shadow-sm text-center"></div>
            </form>
        </div>

        <div class="w-full xl:w-3/4 card !p-0 overflow-hidden min-w-0 border-0 shadow-sm">
            <div class="p-5 md:p-6 bg-slate-50/50 dark:bg-slate-800/30 border-b border-slate-100 dark:border-slate-800/80 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h3 class="text-heading text-lg">End-to-End Call Journeys</h3>
                <button onclick="exportToCSV()" class="btn-success hidden !py-2 !px-4 text-sm" id="exportBtn">
                    Export Summary CSV
                </button>
            </div>
            
            <div class="table-container border-0 rounded-none shadow-none">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="w-8"></th>
                            <th>Start Time</th>
                            <th>Call ID</th>
                            <th>Originator</th>
                            <th class="text-center">Hops</th>
                            <th class="text-center">Final Result</th>
                            <th class="text-center">Total Duration</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7" class="py-20 text-center text-slate-400 dark:text-slate-500">
                                <svg class="mx-auto h-12 w-12 text-slate-300 dark:text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                                </svg>
                                <span class="font-medium text-base">Select parameters and click "Fetch Call Flow Records".</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 1);
        
        const formatDt = (d) => {
            const tzOffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(d - tzOffset)).toISOString().slice(0, 16);
        };
        
        const fromInput = document.getElementById('timeFrom');
        const toInput = document.getElementById('timeTo');
        
        if (fromInput && toInput) {
            fromInput.value = formatDt(start);
            toInput.value = formatDt(end);
        }
    })();

    document.getElementById('analyticsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const tableBody = document.getElementById('tableBody');
        const errorMsg = document.getElementById('errorMsg');
        const exportBtn = document.getElementById('exportBtn');
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Fetching...`;
        errorMsg.classList.add('hidden');
        exportBtn.classList.add('hidden');
        
        tableBody.innerHTML = `<tr><td colspan="7" class="py-20 text-center">
            <svg class="animate-spin mx-auto h-8 w-8 text-blue-600 dark:text-blue-400 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
            <span class="font-bold text-slate-600 dark:text-slate-400">Querying RingCentral API...</span>
        </td></tr>`;

        const timeFrom = new Date(document.getElementById('timeFrom').value).toISOString();
        const timeTo = new Date(document.getElementById('timeTo').value).toISOString();
        const dimension = document.getElementById('dimension').value;
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        try {
            const response = await fetch('/api/analytics/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ timeFrom, timeTo, dimension, timeZone })
            });

            const data = await response.json();

            if (!response.ok) throw new Error(data?.error || 'Failed to fetch call records.');

            renderTable(data);
            
            if (data && data.data && data.data.length > 0) {
                exportBtn.classList.remove('hidden');
            }
            
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="7" class="py-16 text-center text-slate-500 font-medium">Failed to load records. Please try adjusting your filters.</td></tr>`;
            errorMsg.innerText = error.message;
            errorMsg.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Fetch Call Flow Records';
        }
    });

    window.toggleDetails = function(rowId) {
        const detailsRow = document.getElementById(`details-${rowId}`);
        const chevron = document.getElementById(`chevron-${rowId}`);
        if (detailsRow.classList.contains('hidden')) {
            detailsRow.classList.remove('hidden');
            chevron.classList.add('rotate-90');
        } else {
            detailsRow.classList.add('hidden');
            chevron.classList.remove('rotate-90');
        }
    };

    function getStatusConfig(result) {
        const r = (result || '').toLowerCase();
        if (['completed', 'accepted', 'answered', 'pickedup', 'connected'].includes(r)) {
            return { text: 'text-emerald-700 dark:text-emerald-400', bg: 'bg-emerald-50 dark:bg-emerald-900/30', dot: 'bg-emerald-500', border: 'border-emerald-200 dark:border-emerald-800/50' };
        }
        if (['missed', 'abandoned', 'notanswered', 'stopped'].includes(r)) {
            return { text: 'text-rose-700 dark:text-rose-400', bg: 'bg-rose-50 dark:bg-rose-900/30', dot: 'bg-rose-500', border: 'border-rose-200 dark:border-rose-800/50' };
        }
        if (['voicemail', 'callback'].includes(r)) {
            return { text: 'text-amber-700 dark:text-amber-400', bg: 'bg-amber-50 dark:bg-amber-900/30', dot: 'bg-amber-500', border: 'border-amber-200 dark:border-amber-800/50' };
        }
        if (['transferred', 'forwarded', 'transfer'].includes(r)) {
            return { text: 'text-purple-700 dark:text-purple-400', bg: 'bg-purple-50 dark:bg-purple-900/30', dot: 'bg-purple-500', border: 'border-purple-200 dark:border-purple-800/50' };
        }
        return { text: 'text-slate-700 dark:text-slate-300', bg: 'bg-slate-100 dark:bg-slate-800/50', dot: 'bg-slate-400 dark:bg-slate-500', border: 'border-slate-200 dark:border-slate-700/50' };
    }

    function getPartyDetails(party) {
        if (!party) return null;
        if (typeof party === 'string') return party;
        
        const name = party.name || party.endpointName || party.extensionName || party.agentName;
        const num = party.extensionNumber || party.phoneNumber || party.number || party.target || party.dialedNumber || party.calledNumber || party.id;
        
        if (name && num && name !== num) return `${name} (${num})`;
        if (name) return name;
        if (num) return num;
        return null;
    }

    function renderTable(data) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        if (!data || !data.data || data.data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" class="py-16 text-center text-slate-500 italic">No calls found for this date range and dimension.</td></tr>`;
            return;
        }

        data.data.forEach((record, index) => {
            const hops = record.hops || [];
            if (hops.length === 0) return;

            const firstHop = hops[0];
            const lastHop = hops[hops.length - 1];
            
            const startTime = new Date(firstHop.startedAt).toLocaleString();
            const shortCallId = record.callId ? record.callId.substring(0, 11) + '...' : '-';
            
            const originator = getPartyDetails(firstHop.from) || getPartyDetails(record.from) || getPartyDetails(firstHop.queue) || 'Unknown Caller';
            
            let finalResult = lastHop.result || lastHop.response || lastHop.action || firstHop.result || firstHop.action || 'Unknown';
            const wentToVm = hops.some(h => 
                h.result === 'Voicemail' || h.response === 'Voicemail' || h.action === 'Voicemail' || 
                (h.segmentsDuration && (h.segmentsDuration.voicemail > 0 || h.segmentsDuration.vmGreeting > 0))
            );
            
            if (wentToVm) finalResult = 'Voicemail';
            if (hops.some(h => (h.action || '').toLowerCase().includes('callback'))) finalResult = 'Callback Requested';
            
            const totalDurationMs = hops.reduce((sum, h) => sum + (h.duration || 0), 0);
            const totalDurationFmt = formatSeconds(totalDurationMs / 1000);

            const resultConfig = getStatusConfig(finalResult);

            const trMain = document.createElement('tr');
            trMain.className = `cursor-pointer summary-row transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800/60 border-b border-slate-100 dark:border-slate-800/80`;
            trMain.setAttribute('onclick', `toggleDetails(${index})`);
            trMain.innerHTML = `
                <td class="w-8 text-center text-slate-400">
                    <svg id="chevron-${index}" class="w-5 h-5 mx-auto transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </td>
                <td class="font-bold text-slate-800 dark:text-slate-200">${startTime}</td>
                <td class="text-slate-400 dark:text-slate-500 font-mono text-xs" title="${record.callId}">${shortCallId}</td>
                <td class="font-bold text-slate-700 dark:text-slate-300">${originator}</td>
                <td class="text-center">
                    <span class="badge badge-info">${hops.length}</span>
                </td>
                <td class="text-center">
                    <span class="badge ${resultConfig.bg} ${resultConfig.text} ${resultConfig.border}">${finalResult}</span>
                </td>
                <td class="text-center font-bold text-slate-600 dark:text-slate-400">${totalDurationFmt}</td>
            `;
            tableBody.appendChild(trMain);

            const trDetails = document.createElement('tr');
            trDetails.id = `details-${index}`;
            trDetails.className = `hidden bg-slate-50/50 dark:bg-slate-900/30 border-b-2 border-slate-100 dark:border-slate-800 shadow-inner`;
            
            let hopsHtml = `<div class="p-8 w-full max-w-5xl mx-auto relative journey-timeline">`;
            
            let lastKnownQueue = null;
            let lastKnownTo = null;
            
            hops.forEach((hop, hIndex) => {
                let extFrom = getPartyDetails(hop.from);
                let extTo = getPartyDetails(hop.to);
                let extQueue = getPartyDetails(hop.queue);
                let extTransferred = getPartyDetails(hop.transferredTo);
                
                if (extQueue) lastKnownQueue = extQueue;
                
                let hFrom = extFrom;
                let hTo = extTo;
                
                if (!hFrom || hFrom === 'Unknown') {
                    hFrom = lastKnownQueue || lastKnownTo || originator;
                }
                
                if (!hTo || hTo === 'Unknown') {
                    if (extQueue) {
                        hTo = extQueue;
                    } else if (extTransferred) {
                        hTo = extTransferred;
                    } else if (hop.segmentsDuration && hop.segmentsDuration.transfer > 0) {
                        hTo = 'External/Blind Transfer';
                    } else {
                        hTo = 'Unknown Destination';
                    }
                }
                
                if (hTo !== 'Unknown Destination' && hTo !== 'External/Blind Transfer') {
                    lastKnownTo = hTo;
                }
                
                const hType = hop.callType || 'Call';
                const hAction = hop.action ? `[${hop.action}]` : '';
                const hReason = hop.reason ? `(${hop.reason})` : '';
                const hResult = hop.result || hop.response || hop.action || 'Unknown';
                
                const hDur = formatSeconds((hop.duration || 0) / 1000);
                const hopConfig = getStatusConfig(hResult);
                
                let segmentsHtml = '';
                if (hop.segmentsDuration) {
                    const segs = hop.segmentsDuration;
                    const segmentsToDisplay = [];
                    
                    const chronologicalOrder = [
                        { key: 'setup', label: 'Setup', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z' },
                        { key: 'ivrPrompt', label: 'IVR', icon: 'M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z' },
                        { key: 'ringing', label: 'Ringing', icon: 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' },
                        { key: 'liveTalk', label: 'Talk', icon: 'M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z' },
                        { key: 'hold', label: 'Hold', icon: 'M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z' },
                        { key: 'park', label: 'Park', icon: 'M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4' },
                        { key: 'transfer', label: 'Transfer', icon: 'M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4' },
                        { key: 'vmGreeting', label: 'VM Greeting', icon: 'M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z' },
                        { key: 'voicemail', label: 'Voicemail', icon: 'M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z' },
                        { key: 'forwarding', label: 'Forwarding', icon: 'M13 5l7 7-7 7M5 5l7 7-7 7' }
                    ];

                    chronologicalOrder.forEach(s => {
                        if (segs[s.key] && segs[s.key] > 0) {
                            segmentsToDisplay.push(`
                                <div class="flex items-center space-x-1.5 bg-slate-100/50 dark:bg-slate-800 border border-slate-200/60 dark:border-slate-700/50 px-3 py-1.5 rounded-xl text-slate-600 dark:text-slate-300">
                                    <svg class="w-3.5 h-3.5 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${s.icon}"></path></svg>
                                    <span class="text-[11px] font-bold tracking-wide">${s.label}: ${formatSeconds(segs[s.key]/1000)}</span>
                                </div>
                            `);
                        }
                    });

                    if (segmentsToDisplay.length > 0) {
                        const arrowDivider = `<svg class="w-3 h-3 text-slate-300 dark:text-slate-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
                        segmentsHtml = `<div class="flex flex-wrap items-center gap-2 mt-4 pt-4 border-t border-slate-100 dark:border-slate-700/50">
                                            ${segmentsToDisplay.join(arrowDivider)}
                                        </div>`;
                    }
                }

                hopsHtml += `
                    <div class="relative pl-12 pb-8 last:pb-0">
                        <div class="absolute left-[13px] top-2 w-4 h-4 rounded-full ${hopConfig.dot} border-4 border-white dark:border-slate-900 shadow-sm z-10"></div>
                        
                        <div class="card !p-5 !shadow-sm hover:!shadow-md hover:-translate-y-0.5">
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div class="flex items-center flex-wrap gap-2 text-sm">
                                    <span class="bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 border border-slate-200 dark:border-slate-600 text-[10px] font-black uppercase tracking-widest px-2.5 py-1 rounded-lg">Hop ${hIndex + 1}</span>
                                    <span class="font-bold text-slate-800 dark:text-slate-100 ml-1">${hFrom}</span>
                                    <svg class="w-4 h-4 text-slate-300 dark:text-slate-500 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                    <span class="font-bold text-slate-800 dark:text-slate-100">${hTo}</span>
                                </div>
                                
                                <div class="flex items-center gap-4 text-right">
                                    <div class="flex flex-col items-end">
                                        <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-0.5">${hType} <span class="text-blue-500 dark:text-blue-400 ml-1">${hAction}</span></span>
                                        <span class="text-sm font-black ${hopConfig.text}">${hResult} <span class="text-[10px] text-slate-400 dark:text-slate-500 font-normal ml-1">${hReason}</span></span>
                                    </div>
                                    <div class="bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-xl text-sm font-bold text-slate-600 dark:text-slate-300 shadow-inner">
                                        ⏱ ${hDur}
                                    </div>
                                </div>
                            </div>
                            ${segmentsHtml}
                        </div>
                    </div>
                `;
            });
            
            hopsHtml += `</div>`;
            trDetails.innerHTML = `<td colspan="7" class="p-0 border-0">${hopsHtml}</td>`;
            tableBody.appendChild(trDetails);
        });
    }

    function formatSeconds(sec) {
        if (!sec || sec <= 0) return "0s";
        const m = Math.floor(sec / 60);
        const s = Math.round(sec % 60);
        return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function exportToCSV() {
        const rows = document.querySelectorAll("table tr.summary-row");
        let csvContent = "Start Time,Call ID,Originator,Total Hops,Final Result,Total Duration\r\n";
        
        rows.forEach(row => {
            const cols = row.querySelectorAll("td");
            if (cols.length > 1) { 
                const rowData = Array.from(cols).slice(1).map(col => {
                    let text = col.getAttribute("title") || col.innerText.trim();
                    return `"${text}"`;
                }).join(",");
                csvContent += rowData + "\r\n";
            }
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "RC_CallFlow_Summary.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
