<script>
    function renderTable(payload) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        if (!payload?.data?.length) {
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">No calls found.</td></tr>`;
            return;
        }

        // --- AGGRESSIVE STITCHING ENGINE ---
        const grouped = {};
        
        payload.data.forEach(session => {
            const cid = session.callId;
            const sid = session.sessionId; // Track individual session IDs
            
            if (!grouped[cid]) {
                grouped[cid] = { callId: cid, hops: [] };
            }
            
            if (session.hops) {
                session.hops.forEach(h => {
                    // Attach the SessionID to the hop for forensic visibility
                    h.parentSessionId = sid;
                    grouped[cid].hops.push(h);
                });
            }
        });

        const journeys = Object.values(grouped).map(j => {
            // Remove exact duplicate hops (sometimes the API returns the same leg in multiple sessions)
            // We use start time + from number + to number as a unique key
            const uniqueHops = [];
            const hopKeys = new Set();
            
            j.hops.forEach(h => {
                const key = `${h.startedAt}-${h.from?.number}-${h.to?.number}`;
                if (!hopKeys.has(key)) {
                    uniqueHops.push(h);
                    hopKeys.add(key);
                }
            });

            uniqueHops.sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
            return { ...j, hops: uniqueHops };
        }).sort((a, b) => new Date(b.hops[0]?.startedAt) - new Date(a.hops[0]?.startedAt));

        // --- UI RENDERING ---
        journeys.forEach((j, idx) => {
            const first = j.hops[0], last = j.hops[j.hops.length - 1];
            if (!first) return;

            // Result Logic: Override 'Completed' if any hop shows Voicemail or Abandoned
            let finalResult = last.result || 'Unknown';
            if (j.hops.some(h => h.result === 'Voicemail' || h.segmentsDuration?.voicemail > 0)) {
                finalResult = 'Voicemail';
            } else if (j.hops.some(h => h.result === 'Abandoned')) {
                finalResult = 'Abandoned';
            }
            
            const dur = formatSeconds(j.hops.reduce((s, h) => s + (h.duration || 0), 0) / 1000);
            const conf = getStatusConfig(finalResult);

            const row = document.createElement('tr');
            row.className = "hover:bg-blue-50 border-b cursor-pointer summary-row";
            row.onclick = () => toggleDetails(idx);
            row.innerHTML = `
                <td class="px-4 py-4 text-slate-400"><svg id="chevron-${idx}" class="chevron w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></td>
                <td class="px-6 py-4 font-medium">${new Date(first.startedAt).toLocaleString()}</td>
                <td class="px-6 py-4 text-xs font-mono text-slate-500" title="${j.callId}">${j.callId.slice(0, 8)}...</td>
                <td class="px-6 py-4 font-semibold">${first.from?.name || first.from?.number || 'Unknown'}</td>
                <td class="px-6 py-4 text-center"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded-full text-xs font-bold">${j.hops.length}</span></td>
                <td class="px-6 py-4 text-center"><span class="${conf.bg} ${conf.text} px-2.5 py-1 rounded-full text-xs font-bold border">${finalResult}</span></td>
                <td class="px-6 py-4 text-center font-medium">${dur}</td>
            `;
            tableBody.appendChild(row);

            const det = document.createElement('tr');
            det.id = `details-${idx}`;
            det.className = "hidden bg-slate-50 border-b-2 shadow-inner";
            let timeline = `<div class="p-6 max-w-5xl mx-auto relative journey-timeline">`;
            
            j.hops.forEach((h, hidx) => {
                const hConf = getStatusConfig(h.result);
                let segs = '';
                const order = [
                    {k:'setup', l:'Setup'}, {k:'ivrPrompt', l:'IVR'}, {k:'ringing', l:'Ringing'}, 
                    {k:'liveTalk', l:'Talk'}, {k:'hold', l:'Hold'}, {k:'vmGreeting', l:'VM'}, {k:'voicemail', l:'Recording'}
                ];
                const active = order.filter(o => h.segmentsDuration?.[o.k] > 0);
                if (active.length) {
                    segs = `<div class="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t">` + 
                           active.map(a => `<span class="bg-white border text-[10px] px-2 py-1 rounded shadow-sm"><b>${a.l}:</b> ${formatSeconds(h.segmentsDuration[a.k]/1000)}</span>`).join(' <span class="text-slate-300">➔</span> ') + 
                           `</div>`;
                }

                timeline += `
                    <div class="relative pl-10 pb-6 last:pb-0">
                        <div class="absolute left-[13px] top-1.5 w-4 h-4 rounded-full ${hConf.dot} border-[3px] border-white z-10 shadow-sm"></div>
                        <div class="bg-white border rounded-lg p-4 shadow-sm">
                            <div class="flex justify-between items-start">
                                <div class="flex flex-col gap-1">
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] font-bold bg-slate-800 text-white px-1.5 py-0.5 rounded">HOP ${hidx+1}</span>
                                        <span class="font-bold text-slate-900">${h.from?.number || 'Unknown'}</span> ➔ <span class="font-bold text-slate-900">${h.to?.name || h.to?.number || 'Unknown'}</span>
                                    </div>
                                    <div class="text-[9px] text-slate-400 font-mono">Session ID: ${h.parentSessionId.slice(0, 12)}...</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs font-black ${hConf.text} uppercase tracking-tighter">${h.result}</div>
                                    <div class="text-[10px] text-slate-500 font-medium">${h.callType} • ${formatSeconds(h.duration/1000)}</div>
                                </div>
                            </div>
                            ${segs}
                        </div>
                    </div>`;
            });
            det.innerHTML = `<td colspan="7" class="p-0">${timeline}</div></td>`;
            tableBody.appendChild(det);
        });
    }
</script>
