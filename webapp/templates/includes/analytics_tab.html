<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800">V2 API Debugger</h2>
    <p class="text-slate-500 text-sm italic">Burden of Proof: Full /v2/accounts/~ Dump</p>
</div>

<div class="w-full bg-white p-6 rounded shadow-sm border border-slate-200">
    {% if not session.get('analytics_isolated_token_vfinal') %}
        <div class="space-y-4">
            <input type="text" id="targetAccountId" class="border p-3 w-full rounded" placeholder="Enter RC Account ID">
            <button onclick="startAuth()" class="bg-slate-900 text-white p-3 w-full font-bold rounded">LOGIN & BRIDGE</button>
        </div>
    {% else %}
        <button onclick="dumpV2Response()" class="bg-blue-600 hover:bg-blue-700 text-white p-4 w-full font-bold rounded shadow-transition">
            FETCH RAW V2 ACCOUNT JSON
        </button>
        
        <div id="v2ResponseContainer" class="mt-6 hidden">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Platform Response (v2)</h3>
                <span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold">Status: 200 OK</span>
            </div>
            <pre id="v2JsonDump" class="bg-slate-900 text-green-400 p-4 rounded text-xs overflow-auto max-h-[500px] font-mono leading-relaxed border-l-4 border-green-500"></pre>
        </div>
        
        <div class="mt-6 text-center border-t pt-4">
            <button onclick="location.href='/api/analytics/logout'" class="text-xs text-slate-400 hover:text-red-500 underline font-bold uppercase">Reset Session</button>
        </div>
    {% endif %}
</div>

<script>
    function startAuth() {
        const id = document.getElementById('targetAccountId').value.trim();
        if (id) window.location.href = `/api/analytics/auth?targetAccountId=${id}`;
    }

    async function dumpV2Response() {
        const container = document.getElementById('v2ResponseContainer');
        const display = document.getElementById('v2JsonDump');
        
        container.classList.remove('hidden');
        display.innerText = "// Requesting: https://platform.ringcentral.com/restapi/v2/accounts/~\n// Please wait...";

        try {
            const r = await fetch('/api/analytics/test-connection');
            const data = await r.json();
            
            // Format the JSON for maximum readability
            display.innerText = JSON.stringify(data, null, 4);
        } catch (e) {
            display.innerText = "Error fetching v2 response: " + e.message;
        }
    }
</script>
