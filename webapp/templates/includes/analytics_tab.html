<style>
    .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .chevron { transition: transform 0.2s ease-in-out; }
    .chevron.open { transform: rotate(90deg); }
</style>

<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800 mb-1">Business Analytics Records</h2>
    <p class="text-slate-500 text-sm italic">Secure Admin Impersonation Mode</p>
</div>

<div class="flex flex-col xl:flex-row gap-6 items-start w-full">
    
    <div class="w-full xl:w-1/4 bg-white p-5 rounded shadow-sm border border-slate-200">
        
        <div id="authGate">
            <h3 class="font-bold text-xs text-slate-800 mb-4 uppercase tracking-widest">Connect to Target</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-1 uppercase">Target Account ID</label>
                    <input type="text" id="targetAccountId" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-black outline-none" placeholder="Enter ID (e.g. 758735...)">
                </div>
                <button type="button" id="connectBtn" onclick="validateSessionAndAccount()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-2 rounded text-xs transition-all">
                    VALIDATE & UNLOCK
                </button>
            </div>
        </div>

        <div id="paramControls" style="display: none;">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-100">
                <span class="text-[10px] font-bold text-green-600 uppercase">● Session Authorized</span>
                <button onclick="location.reload()" class="text-[10px] text-slate-400 hover:text-red-500 font-bold uppercase">Reset</button>
            </div>
            
            <form id="analyticsForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">DIMENSION</label>
                    <select id="dimension" class="w-full border border-slate-300 rounded p-2 text-sm">
                        <option value="Users">Users</option>
                        <option value="Queues">Call Queues</option>
                        <option value="Sites">Sites</option>
                        <option value="IVRs">IVR Menus</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">START DATE</label>
                    <input type="datetime-local" id="timeFrom" class="w-full border border-slate-300 rounded p-2 text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">END DATE</label>
                    <input type="datetime-local" id="timeTo" class="w-full border border-slate-300 rounded p-2 text-sm" required>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded shadow-sm transition">
                    RUN ANALYSIS
                </button>
            </form>
        </div>
        
        <div id="sideError" class="hidden mt-4 p-3 text-[11px] bg-red-50 text-red-600 border border-red-100 rounded leading-relaxed"></div>
    </div>

    <div class="w-full xl:w-3/4 bg-white rounded shadow-sm border border-slate-200 overflow-hidden min-h-[500px]">
        <div id="uiLockout" class="p-24 text-center bg-slate-50/50">
            <svg class="mx-auto h-12 w-12 text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2-2V7a4 4 0 00-8 0v4h8z" /></svg>
            <p class="text-slate-400 font-medium italic">Please enter a Target Account ID to unlock analytics.</p>
        </div>

        <div id="dataTable" class="hidden">
            <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <h3 id="tableTitle" class="font-bold text-slate-700 text-xs uppercase tracking-widest italic">Call Records</h3>
                <button onclick="exportToCSV()" id="exportBtn" class="hidden bg-green-600 text-white text-[10px] font-bold py-1 px-3 rounded shadow-sm">EXPORT CSV</button>
            </div>
            <div class="table-container overflow-x-auto w-full">
                <table class="w-full text-sm text-left whitespace-nowrap">
                    <thead class="text-[10px] text-slate-500 uppercase bg-slate-100 border-b border-slate-200">
                        <tr>
                            <th class="px-4 py-3 w-8"></th>
                            <th class="px-6 py-3">Start Time</th>
                            <th class="px-6 py-3">Call ID</th>
                            <th class="px-6 py-3">Originator</th>
                            <th class="px-6 py-3 text-center">Hops</th>
                            <th class="px-6 py-3 text-center">Result</th>
                            <th class="px-6 py-3 text-center">Duration</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Validate Session & Account
    async function validateSessionAndAccount() {
        const id = document.getElementById('targetAccountId').value.trim();
        const btn = document.getElementById('connectBtn');
        const err = document.getElementById('sideError');
        
        if (!id) {
            err.innerText = "Please enter a Target Account ID.";
            err.classList.remove('hidden');
            return;
        }

        btn.disabled = true; btn.innerText = 'Validating...'; err.classList.add('hidden');

        try {
            const response = await fetch('/api/analytics/validate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ targetAccountId: id })
            });
            const data = await response.json();

            if (!response.ok) {
                // Check if error is due to missing PKCE connection
                if (data.error === "NOT_CONNECTED") {
                    err.innerHTML = `<strong>Disconnected:</strong> ${data.message}`;
                } else {
                    err.innerText = data.message || data.error;
                }
                err.classList.remove('hidden');
                return;
            }

            // UNLOCK UI
            document.getElementById('authGate').style.display = 'none';
            document.getElementById('paramControls').style.display = 'block';
            document.getElementById('uiLockout').classList.add('hidden');
            document.getElementById('dataTable').classList.remove('hidden');
            document.getElementById('tableTitle').innerText = `Records: Account ${id}`;
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="py-20 text-center text-slate-400 italic">Connected. Adjust parameters and Run Analysis.</td></tr>`;

        } catch(e) {
            err.innerText = "System Error: Unable to reach validation endpoint.";
            err.classList.remove('hidden');
        } finally {
            btn.disabled = false; btn.innerText = 'VALIDATE & UNLOCK';
        }
    }

    // 2. Main Form Submit
    document.getElementById('analyticsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const sBtn = document.getElementById('submitBtn');
        const tBody = document.getElementById('tableBody');
        sBtn.disabled = true; sBtn.innerHTML = `<span class="animate-pulse">Fetching...</span>`;

        const payload = {
            targetAccountId: document.getElementById('targetAccountId').value,
            timeFrom: new Date(document.getElementById('timeFrom').value).toISOString(),
            timeTo: new Date(document.getElementById('timeTo').value).toISOString(),
            dimension: document.getElementById('dimension').value,
            timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
        };

        try {
            const r = await fetch('/api/analytics/records', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const d = await r.json();
            
            if (!r.ok) throw new Error(d.message || d.error || 'Failed to fetch.');
            
            renderTable(d);
            document.getElementById('exportBtn').classList.remove('hidden');
        } catch(e) {
            tBody.innerHTML = `<tr><td colspan="7" class="py-20 text-center text-red-500 font-bold italic">${e.message}</td></tr>`;
        } finally {
            sBtn.disabled = false; sBtn.innerText = 'RUN ANALYSIS';
        }
    });

    // 3. Robust Rendering (Original helper functions included)
    function renderTable(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        if (!data || !data.data || data.data.length === 0) {
            body.innerHTML = '<tr><td colspan="7" class="py-20 text-center text-slate-400 font-medium">No records found for this period.</td></tr>';
            return;
        }

        data.data.forEach((rec, idx) => {
            const hops = rec.hops || [];
            if (hops.length === 0) return;
            const first = hops[0]; const last = hops[hops.length-1];
            
            let result = last.result || first.result || 'Unknown';
            const wentToVm = hops.some(h => h.result === 'Voicemail' || (h.segmentsDuration && (h.segmentsDuration.voicemail > 0)));
            if (wentToVm) result = 'Voicemail';

            const resCfg = getStatusConfig(result);
            const totalMs = hops.reduce((s, h) => s + (h.duration || 0), 0);
            
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 cursor-pointer border-b transition-colors";
            tr.onclick = () => toggleDetails(idx);
            tr.innerHTML = `
                <td class="px-4 py-4 text-slate-300">
                    <svg id="chevron-${idx}" class="chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </td>
                <td class="px-6 py-4 font-medium text-slate-700">${new Date(first.startedAt).toLocaleString()}</td>
                <td class="px-6 py-4 font-mono text-[10px] text-slate-400">${rec.callId.substring(0,10)}...</td>
                <td class="px-6 py-4 font-bold text-slate-800">${first.from?.name || first.from?.number || 'System'}</td>
                <td class="px-6 py-4 text-center"><span class="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold text-slate-600">${hops.length}</span></td>
                <td class="px-6 py-4 text-center"><span class="${resCfg.bg} ${resCfg.text} text-[10px] font-black px-2 py-1 rounded-full border border-current shadow-sm">${result}</span></td>
                <td class="px-6 py-4 text-center font-bold text-slate-700">${formatSeconds(totalMs/1000)}</td>
            `;
            body.appendChild(tr);

            // Detail Row
            const detailRow = document.createElement('tr');
            detailRow.id = `details-${idx}`;
            detailRow.className = "hidden bg-slate-50/50";
            let hopList = '<td colspan="7" class="p-8 relative space-y-4">';
            hops.forEach((h, hidx) => {
                const hCfg = getStatusConfig(h.result);
                hopList += `
                    <div class="relative pl-8">
                        <div class="absolute left-0 top-1.5 w-3 h-3 rounded-full ${hCfg.dot} border-2 border-white shadow-sm"></div>
                        <div class="bg-white border p-3 rounded shadow-sm flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-700">Hop ${hidx+1}: ${h.from?.name || 'In'} ➔ ${h.to?.name || 'Out'}</span>
                            <span class="text-[10px] font-bold ${hCfg.text}">${h.result} (${formatSeconds(h.duration/1000)})</span>
                        </div>
                    </div>`;
            });
            detailRow.innerHTML = hopList + '</td>';
            body.appendChild(detailRow);
        });
    }

    function toggleDetails(i) {
        document.getElementById(`details-${i}`).classList.toggle('hidden');
        document.getElementById(`chevron-${i}`).classList.toggle('open');
    }

    function getStatusConfig(r) {
        const s = (r || '').toLowerCase();
        if(['completed','answered','accepted'].includes(s)) return {text:'text-green-700', bg:'bg-green-50', dot:'bg-green-500'};
        if(['missed','abandoned','dropped'].includes(s)) return {text:'text-red-700', bg:'bg-red-50', dot:'bg-red-500'};
        return {text:'text-slate-500', bg:'bg-slate-50', dot:'bg-slate-400'};
    }

    function formatSeconds(s) {
        if(!s || s<=0) return "0s";
        const m = Math.floor(s/60); const sec = Math.round(s%60);
        return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    }
</script>
