<style>
    .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
    .table-container::-webkit-scrollbar-track { background: #f1f5f9; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>

<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800 mb-1">Business Analytics Records</h2>
    <p class="text-slate-500 text-sm">Fetch granular, call-by-call logs and routing hops.</p>
</div>

<div class="flex flex-col xl:flex-row gap-6 items-start w-full">
    
    <div class="w-full xl:w-1/4 bg-white p-5 rounded shadow-sm border border-slate-200">
        <h3 class="font-bold text-lg text-slate-800 mb-4">Report Parameters</h3>
        
        <form id="analyticsForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Dimension</label>
                <select id="dimension" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="Queues">Call Queues</option>
                    <option value="Users">Users</option>
                    <option value="Sites">Sites</option>
                    <option value="IVRs">IVR Menus</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Start Date & Time</label>
                <input type="datetime-local" id="timeFrom" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">End Date & Time</label>
                <input type="datetime-local" id="timeTo" class="w-full border border-slate-300 rounded p-2 text-sm focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-150 ease-in-out mt-2">
                Fetch Call Records
            </button>
            
            <div id="errorMsg" class="text-red-500 text-xs font-medium hidden mt-2"></div>
        </form>
    </div>

    <div class="w-full xl:w-3/4 bg-white rounded shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
            <h3 class="font-bold text-slate-700">Call Log Records</h3>
            <button onclick="exportToCSV()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-1 px-3 rounded hidden" id="exportBtn">
                Export CSV
            </button>
        </div>
        
        <div class="table-container overflow-x-auto w-full">
            <table class="w-full text-sm text-left whitespace-nowrap">
                <thead class="text-xs text-slate-600 uppercase bg-slate-100 border-b border-slate-200">
                    <tr>
                        <th scope="col" class="px-6 py-3">Start Time</th>
                        <th scope="col" class="px-6 py-3">Call ID</th>
                        <th scope="col" class="px-6 py-3">From</th>
                        <th scope="col" class="px-6 py-3">To</th>
                        <th scope="col" class="px-6 py-3 text-center">Direction</th>
                        <th scope="col" class="px-6 py-3 text-center">Result</th>
                        <th scope="col" class="px-6 py-3 text-center">Duration</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-slate-400">
                            Select parameters and click "Fetch Call Records" to view granular logs.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Initialize dates to Last 24 hours when tab loads (better default for granular records)
    (function() {
        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 1);
        
        const formatDt = (d) => {
            const tzOffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(d - tzOffset)).toISOString().slice(0, 16);
        };
        
        const fromInput = document.getElementById('timeFrom');
        const toInput = document.getElementById('timeTo');
        
        if (fromInput && toInput) {
            fromInput.value = formatDt(start);
            toInput.value = formatDt(end);
        }
    })();

    document.getElementById('analyticsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const tableBody = document.getElementById('tableBody');
        const errorMsg = document.getElementById('errorMsg');
        const exportBtn = document.getElementById('exportBtn');
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'Fetching Records...';
        errorMsg.classList.add('hidden');
        exportBtn.classList.add('hidden');
        
        tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-blue-600 font-semibold animate-pulse">Fetching granular call records...</td></tr>`;

        const timeFrom = new Date(document.getElementById('timeFrom').value).toISOString();
        const timeTo = new Date(document.getElementById('timeTo').value).toISOString();
        const dimension = document.getElementById('dimension').value;
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        try {
            // Hit the new records endpoint
            const response = await fetch('/api/analytics/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ timeFrom, timeTo, dimension, timeZone })
            });

            const data = await response.json();

            if (!response.ok) throw new Error(data.error || 'Failed to fetch call records.');

            renderTable(data);
            exportBtn.classList.remove('hidden');
            
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">Failed to load records.</td></tr>`;
            errorMsg.innerText = error.message;
            errorMsg.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Fetch Call Records';
        }
    });

    function renderTable(data) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        // For the Records endpoint, the array of calls is directly inside 'data.data'
        if (!data.data || data.data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">No calls found for this date range.</td></tr>`;
            return;
        }

        data.data.forEach((record, index) => {
            // A single call might have multiple hops. For simplicity in a flat table, 
            // we will extract the primary info from the first hop.
            const hop = (record.hops && record.hops.length > 0) ? record.hops[0] : {};
            
            // Format start time
            const startTime = hop.startedAt ? new Date(hop.startedAt).toLocaleString() : 'Unknown';
            
            // Extract Caller and Callee info
            const fromInfo = (hop.from && (hop.from.name || hop.from.number || hop.from.extensionNumber)) || 'Unknown';
            const toInfo = (hop.to && (hop.to.name || hop.to.number || hop.to.extensionNumber)) || 'Unknown';
            
            const direction = hop.direction || '-';
            const result = hop.result || '-';
            
            // Format Result coloring
            let resultColor = "text-slate-700";
            if (["Completed", "Accepted", "Answered"].includes(result)) resultColor = "text-green-600 font-medium";
            if (["Missed", "Abandoned"].includes(result)) resultColor = "text-red-600 font-medium";
            if (result === "Voicemail") resultColor = "text-orange-500 font-medium";

            // The API returns duration in milliseconds for individual records
            const durationMs = hop.duration || 0;
            const durationFmt = formatSeconds(durationMs / 1000);
            
            // Shorten Call ID for display
            const shortCallId = record.callId ? record.callId.substring(0, 10) + '...' : '-';

            const rowClass = index % 2 === 0 ? "bg-white" : "bg-slate-50";

            const tr = document.createElement('tr');
            tr.className = `${rowClass} hover:bg-blue-50 border-b border-slate-100`;
            tr.innerHTML = `
                <td class="px-6 py-3">${startTime}</td>
                <td class="px-6 py-3 text-slate-500 font-mono text-xs" title="${record.callId}">${shortCallId}</td>
                <td class="px-6 py-3">${fromInfo}</td>
                <td class="px-6 py-3">${toInfo}</td>
                <td class="px-6 py-3 text-center">${direction}</td>
                <td class="px-6 py-3 text-center ${resultColor}">${result}</td>
                <td class="px-6 py-3 text-center">${durationFmt}</td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function formatSeconds(sec) {
        if (!sec || sec < 0) return "0s";
        const m = Math.floor(sec / 60);
        const s = Math.round(sec % 60);
        return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function exportToCSV() {
        const rows = document.querySelectorAll("#tableBody tr");
        let csvContent = "Start Time,Call ID,From,To,Direction,Result,Duration\r\n";
        
        rows.forEach(row => {
            const cols = row.querySelectorAll("td");
            if (cols.length > 1) { 
                const rowData = Array.from(cols).map(col => {
                    // Grab full Call ID from title attribute if present, else innerText
                    let text = col.getAttribute("title") || col.innerText;
                    return `"${text}"`;
                }).join(",");
                csvContent += rowData + "\r\n";
            }
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "RC_Granular_Call_Records.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
