<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-800">API Response Debugger</h2>
    <p class="text-slate-500 text-sm italic">Raw Burden of Proof Check</p>
</div>

<div class="w-full bg-white p-6 rounded shadow-sm border border-slate-200">
    {% if not session.get('analytics_isolated_token_vfinal') %}
        <input type="text" id="targetAccountId" class="border p-2 w-full mb-4" placeholder="Account ID">
        <button onclick="startAuth()" class="bg-slate-900 text-white p-2 w-full font-bold">LOGIN & BRIDGE</button>
    {% else %}
        <button onclick="dumpApiResponse()" class="bg-blue-600 text-white p-3 w-full font-bold rounded">
            FETCH ENTIRE API RESPONSE
        </button>
        
        <div id="rawResponseContainer" class="mt-6 hidden">
            <h3 class="text-xs font-bold uppercase text-slate-400 mb-2">Raw JSON Response from /account/~</h3>
            <pre id="jsonDump" class="bg-slate-900 text-green-400 p-4 rounded text-xs overflow-auto max-h-96 font-mono"></pre>
        </div>
        
        <div class="mt-4 text-center">
            <button onclick="location.href='/api/analytics/logout'" class="text-xs text-slate-400 underline">Logout</button>
        </div>
    {% endif %}
</div>

<script>
    function startAuth() {
        const id = document.getElementById('targetAccountId').value.trim();
        if (id) window.location.href = `/api/analytics/auth?targetAccountId=${id}`;
    }

    async function dumpApiResponse() {
        const container = document.getElementById('rawResponseContainer');
        const display = document.getElementById('jsonDump');
        
        container.classList.remove('hidden');
        display.innerText = "Loading raw response...";

        try {
            const r = await fetch('/api/analytics/test-connection');
            const data = await r.json();
            
            // Format the JSON for readability
            display.innerText = JSON.stringify(data, null, 2);
        } catch (e) {
            display.innerText = "Error fetching response: " + e.message;
        }
    }
</script>
