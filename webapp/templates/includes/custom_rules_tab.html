<div class="tab-pane fade" id="custom-rules" role="tabpanel">
    <div class="card mt-3">
        <div class="card-body">
            <div class="flex justify-between items-center mb-4">
                <h5 class="text-xl font-bold text-gray-800">Bulk Custom Rule Updater</h5>
                
                <a href="{{ url_for('custom_rules.download_template') }}" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2 px-4 rounded inline-flex items-center transition">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download .xlsx Template
                </a>
            </div>

            <p class="text-sm text-gray-600 mb-4">
                Upload an Excel file (.xlsx) or CSV to bulk create/update answering rules. 
                Leave <strong>Rule ID</strong> empty to create new rules.
            </p>

            <form id="rulesUploadForm" class="space-y-4">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded border border-gray-200">
                    <div>
                        <label for="custom_client_id" class="block text-sm font-medium text-gray-700">Client ID</label>
                        <input type="text" id="custom_client_id" name="client_id" required 
                               class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" 
                               placeholder="Enter Client ID">
                    </div>
                    <div>
                        <label for="custom_client_secret" class="block text-sm font-medium text-gray-700">Client Secret</label>
                        <input type="password" id="custom_client_secret" name="client_secret" 
                               class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" 
                               placeholder="Optional (if PKCE)">
                    </div>
                </div>

                <div>
                    <label for="ruleFile" class="block text-sm font-medium text-gray-700">Select File</label>
                    <input class="mt-1 block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none p-2" 
                           type="file" id="ruleFile" name="file" accept=".csv, .xlsx" required>
                </div>

                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full transition">
                    Process Rules
                </button>
            </form>
            
            <div id="ruleLogs" class="mt-4 p-4 bg-gray-50 rounded border border-gray-200 font-mono text-sm text-gray-700 h-64 overflow-y-auto whitespace-pre-line">Waiting for input...</div>
        </div>
    </div>
</div>

<script>
document.getElementById('rulesUploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const btn = e.target.querySelector('button');
    const logDiv = document.getElementById('ruleLogs');
    
    btn.disabled = true;
    btn.textContent = 'Processing...';
    logDiv.textContent = 'Starting upload...';
    logDiv.className = "mt-4 p-4 bg-gray-50 rounded border border-gray-200 font-mono text-sm text-gray-700 h-64 overflow-y-auto whitespace-pre-line";

    try {
        const res = await fetch('/api/update_rules', { method: 'POST', body: formData });
        
        // 1. Check if Server crashed (HTML response)
        const contentType = res.headers.get("content-type");
        if (contentType && contentType.indexOf("application/json") === -1) {
            const text = await res.text();
            logDiv.className = "mt-4 p-4 bg-red-50 rounded border border-red-200 font-mono text-sm text-red-800 h-64 overflow-y-auto whitespace-pre-line";
            
            let cleanText = text;
            if (text.includes('<title>')) {
                const match = text.match(/<title>(.*?)<\/title>/);
                if (match) cleanText = `Server Error: ${match[1]}`;
            }
            logDiv.textContent = `❌ Server returned HTML instead of JSON.\n\n${cleanText}\n\n(Check Cloud Run Logs for details)`;
            throw new Error("Server returned HTML");
        }

        // 2. Parse JSON
        const data = await res.json();
        
        if (res.ok) {
            logDiv.textContent = data.logs ? data.logs.join('\n') : "Success!";
            logDiv.className = "mt-4 p-4 bg-green-50 rounded border border-green-200 font-mono text-sm text-green-800 h-64 overflow-y-auto whitespace-pre-line";
        } else {
            // 3. Show Logic Error (Auth failed, etc)
            logDiv.className = "mt-4 p-4 bg-red-50 rounded border border-red-200 font-mono text-sm text-red-800 h-64 overflow-y-auto whitespace-pre-line";
            const details = data.details || data.error || "Unknown Error";
            logDiv.textContent = `❌ Error: ${details}`;
        }
    } catch (err) {
        if (err.message !== "Server returned HTML") {
            logDiv.textContent = "System Error: " + err.message;
        }
    }
    
    btn.disabled = false;
    btn.textContent = 'Process Rules';
});
</script>
