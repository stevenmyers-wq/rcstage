<div class="tab-pane fade" id="custom-rules" role="tabpanel">
    <div class="card mt-3">
        <div class="card-body">
            <h5 class="card-title">Bulk Custom Rule Updater</h5>
            <form id="rulesUploadForm">
                <div class="mb-3">
                    <label for="ruleFile" class="form-label">Upload CSV/Excel</label>
                    <input class="form-control" type="file" id="ruleFile" name="file" required>
                </div>
                <button type="submit" class="btn btn-primary">Process Rules</button>
            </form>
            <div id="ruleLogs" class="mt-3 text-muted" style="white-space: pre-line;"></div>
        </div>
    </div>
</div>

<script>
document.getElementById('rulesUploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.textContent = 'Processing...';

    const res = await fetch('/api/update_rules', { method: 'POST', body: formData });
    const data = await res.json();
    
    document.getElementById('ruleLogs').innerText = data.logs ? data.logs.join('\n') : data.error;
    btn.disabled = false;
    btn.textContent = 'Process Rules';
});
</script>
