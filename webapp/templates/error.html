<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - RCAU API Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { fontFamily: { sans: ['Inter', 'Roboto', 'sans-serif'] } } }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body { @apply bg-slate-50 text-slate-700 dark:bg-[#0b1120] dark:text-slate-300 font-sans antialiased transition-colors duration-300; }
      }
      @layer components {
        .card { @apply bg-white dark:bg-slate-800/80 rounded-[2rem] border border-slate-200/60 dark:border-slate-700/50 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.2)] p-8 md:p-12 transition-all duration-300 text-center mx-auto max-w-lg w-full; }
        .btn-primary { @apply inline-flex items-center justify-center gap-2 px-6 py-3 rounded-2xl font-bold text-sm bg-blue-600 text-white shadow-sm hover:bg-blue-700 focus:ring-4 focus:ring-blue-500/30 transition-all duration-200 w-full mt-8; }
      }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="card">
        <div class="w-24 h-24 bg-rose-50 dark:bg-rose-900/20 text-rose-500 dark:text-rose-400 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-sm border border-rose-100 dark:border-rose-800/50">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-800 dark:text-slate-100 mb-3 tracking-tight">Oops!</h1>
        <p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">{{ error_message }}</p>
        <a href="{{ url_for('core.index') }}" class="btn-primary">
            Return to Dashboard
        </a>
    </div>
</body>
</html>
