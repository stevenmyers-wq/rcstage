<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Mirror the parent window's Tailwind config
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { fontFamily: { sans: ['Inter', 'Roboto', 'sans-serif'] } } }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body { 
            @apply bg-transparent text-slate-700 dark:text-slate-300 font-sans antialiased transition-colors duration-300; 
        }
        ::-webkit-scrollbar { @apply w-2 h-2; }
        ::-webkit-scrollbar-track { @apply bg-transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-300 dark:bg-slate-700 rounded-full; }
      }
      @layer components {
        .input-label { 
            @apply block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5 ml-1; 
        }
        .input-field { 
            @apply w-full px-4 py-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all outline-none shadow-sm; 
        }
        .btn-primary { 
            @apply inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl font-bold text-sm bg-blue-600 text-white shadow-sm hover:bg-blue-700 focus:ring-4 focus:ring-blue-500/30 transition-all duration-200 w-full; 
        }
      }
    </style>
</head>
<body class="p-4 sm:p-6">
    <div id="form-container" class="max-w-2xl mx-auto space-y-6">
        <div class="border-b border-slate-200 dark:border-slate-800/80 pb-4 mb-6">
            <h2 class="text-2xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight">Active Call Triage</h2>
            <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mt-1">Please confirm the details below with the caller.</p>
        </div>
        
        <form id="triage-form" class="space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="input-label">First Name</label>
                    <input type="text" id="firstName" class="input-field" placeholder="Caller's first name">
                </div>
                <div>
                    <label class="input-label">Last Name</label>
                    <input type="text" id="lastName" class="input-field" placeholder="Caller's last name">
                </div>
            </div>
            
            <div>
                <label class="input-label">Reason for calling</label>
                <textarea id="reason" class="input-field h-28 resize-y" placeholder="Brief description of the issue..."></textarea>
            </div>
            
            <div>
                <label class="input-label">Priority Level</label>
                <select id="priority" class="input-field">
                    <option value="low">Low - General Inquiry</option>
                    <option value="medium">Medium - Needs Attention</option>
                    <option value="high">High - Urgent Issue</option>
                </select>
            </div>
            
            <div class="pt-4">
                <button type="submit" class="btn-primary">Submit Triage Notes</button>
            </div>
        </form>
        
        <div id="status-msg" class="hidden mt-6 p-4 rounded-xl text-sm font-bold text-center border"></div>
    </div>

    <script>
        // Check if the parent window is in dark mode, and apply it to the iframe body
        function syncTheme() {
            if (window.parent && window.parent.document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        
        // Initial sync
        syncTheme();
        
        // Optional: Listen for messages from parent if it toggles theme dynamically
        window.addEventListener('message', (event) => {
            if (event.data === 'theme-toggled') {
                syncTheme();
            }
        });

        // Form submission simulation
        document.getElementById('triage-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Submitting...';
            
            setTimeout(() => {
                const status = document.getElementById('status-msg');
                status.textContent = 'Triage notes submitted successfully!';
                status.className = 'mt-6 p-4 rounded-xl text-sm font-bold text-center bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800 block';
                
                btn.disabled = false;
                btn.textContent = 'Submit Triage Notes';
                e.target.reset();
                
                setTimeout(() => status.classList.add('hidden'), 4000);
            }, 1000);
        });
    </script>
</body>
</html>
