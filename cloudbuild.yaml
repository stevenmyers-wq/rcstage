steps:
# 1. Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/sr-1906369/rcau-repo/rcau-api-tools:$COMMIT_SHA', '.']

# 2. Push the container image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/sr-1906369/rcau-repo/rcau-api-tools:$COMMIT_SHA']

# 3. Deploy the new image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'rcau-api-tools'
  - '--image'
  - 'us-central1-docker.pkg.dev/sr-1906369/rcau-repo/rcau-api-tools:$COMMIT_SHA'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'

# Store the image in Artifact Registry
images:
- 'us-central1-docker.pkg.dev/sr-1906369/rcau-repo/rcau-api-tools:$COMMIT_SHA'

# ADD THIS NEW SECTION TO FIX THE LOGGING ERROR
options:
  logging: CLOUD_LOGGING_ONLY
