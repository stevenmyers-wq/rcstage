<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - RCAU API Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-gray-50">
    <div class="max-w-xl w-full p-8 bg-white rounded-xl shadow-2xl border border-red-200">
        <h1 class="text-3xl font-bold mb-4 text-red-700">Authorization Error</h1>
        <p class="text-gray-600 mb-6">Something went wrong during the external authorization process. You may need to grant permissions again or check the Client ID.</p>
        
        <div class="p-4 bg-red-50 border-l-4 border-red-400 text-sm text-red-800 rounded-md">
            <p class="font-semibold mb-1">Error Details:</p>
            <p>{{ message }}</p>
        </div>
        
        <div class="mt-8">
            <a href="{{ url_for('core.index') }}" class="inline-block bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition duration-150">
                Return to Application
            </a>
        </div>
    </div>
</body>
</html>
